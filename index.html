    // Tesla Model 3 LFP charging curve (conservative kW at each SOC band)
    // The car limits intake regardless of charger max — these are car-side limits.
    // Charger kW caps the rate if lower than the car curve.
    const CHARGE_CURVE = [
      // [socMin, socMax, carMaxKW]  — conservative real-world values
      [0,   10,  120],
      [10,  20,  145],
      [20,  30,  150],  // LFP peaks around 20-40%
      [30,  40,  140],
      [40,  50,  120],
      [50,  60,   85],
      [60,  70,   60],
      [70,  80,   40],
      [80,  90,   22],
      [90,  95,   12],
      [95, 100,    6],
    ];

    // Simulate charging: given arrival SOC%, charger max kW, and minutes → departure SOC%
    function calcChargedSOC(arrivalPct, chargerKW, minutes) {
      let soc = arrivalPct; // current SOC in %
      const stepMin = 0.5;  // simulate in 30-second steps for accuracy
      let remaining = minutes;

      while (remaining > 0 && soc < 100) {
        const step = Math.min(stepMin, remaining);
        // find the car's charge rate at current SOC
        let carRate = 6; // fallback for >95%
        for (const [lo, hi, kw] of CHARGE_CURVE) {
          if (soc >= lo && soc < hi) { carRate = kw; break; }
        }
        // effective rate = min(car curve, charger max output)
        const effectiveKW = Math.min(carRate, chargerKW);
        // energy added in this time step (kWh)
        const energyAdded = effectiveKW * (step / 60);
        // convert to SOC %
        const socAdded = (energyAdded / BATTERY_KWH) * 100;
        soc = Math.min(100, soc + socAdded);
        remaining -= step;
      }
      return Math.round(soc * 10) / 10; // round to 1 decimal
    }

    // ── Helpers ──
    function fmt(m) { const h=Math.floor(m/60), r=m%60; return h===0?`${r}min`:r===0?`${h}h`:`${h}h ${r}min`; }
    function timeOfDay(h, addM) { const t=h*60+addM, hr=Math.floor(t/60)%24, mn=t%60, ap=hr>=12?"PM":"AM", h12=hr===0?12:hr>12?hr-12:hr; return `${h12}:${String(mn).padStart(2,'0')} ${ap}`; }
    function mapEmbed(stop) {
      // Use POI name for chargers to find the actual Tesla Supercharger business listing
      const q = stop.poi || (stop.mq ? stop.mq.replace(/\+/g, " ") : `${stop.lat},${stop.lng}`);
      return `https://maps.google.com/maps?q=${encodeURIComponent(q)}&z=16&output=embed`;
    }
    function mapLink(stop) {
      const q = stop.poi || stop.mq;
      return `https://www.google.com/maps/search/${q}`;
    }
    function dayRouteUrl(stops) {
      return "https://www.google.com/maps/dir/" + stops.map(s => s.mq).join("/");
    }
    function dayStats(stops) {
      let dist=0, drv=0, stay=0, chrg=0, cs=0;
      stops.forEach(s => { dist+=s.dist; drv+=s.drive; stay+=s.stay; if(s.type==="charge"){chrg+=s.stay;cs++;} });
      return {dist,drv,stay,chrg,cs};
    }

    // ── Charger Status (Open Charge Map API with fallback to local data) ──
    const OCM_API = "https://api.openchargemap.org/v3/poi/";

    async function fetchChargerStatus(lat, lng) {
      try {
        // Search wider radius, no operator filter, to maximize chance of finding the station
        const url = `${OCM_API}?output=json&latitude=${lat}&longitude=${lng}&distance=5&distanceunit=KM&maxresults=5&compact=true&verbose=false`;
        const res = await fetch(url);
        if (!res.ok) return null;
        const data = await res.json();
        if (!data || data.length === 0) return null;
        // Try to find a Tesla station first, otherwise take the closest
        const tesla = data.find(s => {
          const op = s.OperatorInfo?.Title || s.AddressInfo?.Title || "";
          return op.toLowerCase().includes("tesla");
        });
        const site = tesla || data[0];
        const conns = site.Connections || [];
        const totalPoints = conns.reduce((s, c) => s + (c.Quantity || 1), 0);
        const status = site.StatusType?.Title || "Unknown";
        const verified = site.DateLastVerified || site.DateLastStatusUpdate;
        const addr = site.AddressInfo;
        const opName = site.OperatorInfo?.Title || "";
        return {
          title: addr?.Title || "Charging Station",
          status,
          totalPoints,
          isTesla: opName.toLowerCase().includes("tesla"),
          operator: opName,
          connections: conns.map(c => ({
            type: c.ConnectionType?.Title || "Unknown",
            kw: c.PowerKW || 0,
            qty: c.Quantity || 1,
            status: c.StatusType?.Title || status,
          })),
          lastVerified: verified ? new Date(verified).toLocaleDateString() : null,
        };
      } catch { return null; }
    }

    function ChargerAvailability({ lat, lng, stopId, chargeInfo }) {
      const [ocmData, setOcmData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [fetchedAt, setFetchedAt] = useState(null);
      const [ocmFailed, setOcmFailed] = useState(false);

      const doFetch = async () => {
        setLoading(true);
        const result = await fetchChargerStatus(lat, lng);
        setOcmData(result);
        setOcmFailed(!result);
        setFetchedAt(new Date());
        setLoading(false);
      };

      React.useEffect(() => { doFetch(); }, []);

      // Merge: prefer OCM live data, fall back to our hardcoded chargeInfo
      const hasOcm = ocmData && ocmData.isTesla;
      const status = hasOcm ? ocmData.status : "Operational";
      const totalPoints = hasOcm ? ocmData.totalPoints : chargeInfo.stalls;
      const connections = hasOcm && ocmData.connections.length > 0
        ? ocmData.connections
        : [{ type: "CCS2 / Tesla", kw: chargeInfo.kw, qty: chargeInfo.stalls, status: "Operational" }];
      const source = hasOcm ? "Open Charge Map" : "Local data";
      const statusColor = status === "Operational" ? "#22c55e" : status === "Planned" ? "#f59e0b" : "#ef4444";

      return (
        <div className="px-3.5 py-2 border-t border-[#2a2a2a] bg-[#0a0a0a]">
          <div className="flex items-center gap-2 mb-1">
            <span className="text-[10px] font-semibold text-gray-300">📡 Charger Info</span>
            <span className="text-[9px] font-bold px-1.5 py-0.5 rounded-full" style={{background: statusColor + "22", color: statusColor, border: `1px solid ${statusColor}44`}}>
              {status}
            </span>
          </div>
          <div className="flex items-center gap-3 flex-wrap text-[10px]">
            {connections.map((c, i) => (
              <span key={i} className="text-gray-400">
                ⚡ {c.qty}× {c.type} {c.kw > 0 ? `(${c.kw}kW)` : ""}
              </span>
            ))}
          </div>
        </div>
      );
    }

    // ── Comments persistence ──
    function loadComments() {
      try { return JSON.parse(localStorage.getItem("tripComments") || "{}"); } catch { return {}; }
    }
    function saveComments(c) { localStorage.setItem("tripComments", JSON.stringify(c)); }

    function CommentsSection({stopId}) {
      const [comments, setComments] = useState(() => (loadComments()[stopId] || []));
      const [text, setText] = useState("");
      const [open, setOpen] = useState(false);

      const persist = (next) => { const all = loadComments(); all[stopId] = next; saveComments(all); };

      const add = () => {
        if (!text.trim()) return;
        const next = [...comments, { text: text.trim(), ts: new Date().toLocaleString() }];

    function BatteryGauge({pct}) {
      const c = pct>50?"#22c55e":pct>20?"#f59e0b":"#ef4444";
      return (

    // Detect if a name/location looks like a Tesla Supercharger
    function isChargerName(name) {
      const n = (name || "").toLowerCase();
      return n.includes("supercharger") || n.includes("tesla charger") || n.includes("charging station");
    }

    function makeChargeDefaults() {
      return { type: "Tesla Supercharger V3", stalls: 6, kw: 250 };
    }

    // Haversine distance in km
    function haversine(lat1, lng1, lat2, lng2) {
      const R = 6371, toR = Math.PI / 180;
      const dLat = (lat2 - lat1) * toR, dLng = (lng2 - lng1) * toR;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toR) * Math.cos(lat2*toR) * Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // Speed-based battery consumption for Tesla Model 3 Base (LFP 60kWh)
    // Returns kWh/100km based on average speed
    function consumptionAtSpeed(avgKmh) {
      if (avgKmh <= 40) return 12;   // city crawl
      if (avgKmh <= 60) return 13;   // suburban
      if (avgKmh <= 80) return 14.5; // outer suburban / country
      if (avgKmh <= 100) return 16;  // highway
      if (avgKmh <= 110) return 18;  // fast highway
      return 20;                      // motorway 110+
    }

    // Get real road distance + drive time via OSRM (free, no key)
    async function fetchDriveStats(fromLat, fromLng, toLat, toLng) {
      try {
        const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${fromLng},${fromLat};${toLng},${toLat}?overview=false`);
        const data = await res.json();
        if (data.code === "Ok" && data.routes && data.routes.length > 0) {
          const route = data.routes[0];
          const dist = Math.round(route.distance / 1000); // meters to km
          const drive = Math.round(route.duration / 60); // seconds to minutes
          const avgSpeed = dist / (drive / 60); // km/h
          const kwhPer100 = consumptionAtSpeed(avgSpeed);
          const energyUsed = dist * kwhPer100 / 100; // kWh
          const batt = Math.round(energyUsed / BATTERY_KWH * 100); // % of 60kWh battery
          return { dist, drive, batt, _routeSource: "osrm" };
        }
      } catch {}
      // Fallback to estimate if OSRM fails
      const straight = haversine(fromLat, fromLng, toLat, toLng);
      const roadKm = Math.round(straight * 1.35);
      return { dist: roadKm, drive: Math.round(roadKm / 80 * 60), batt: Math.round(roadKm * 0.23), _routeSource: "estimate" };
    }

    // Geocode address via Nominatim, returns {lat, lng} or null
    async function geocodeAddress(address) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`);
        const data = await res.json();
        if (data && data.length > 0) return { lat: +data[0].lat, lng: +data[0].lon };
      } catch {}
      return null;
    }

    // Photon autocomplete API (OpenStreetMap-based, free, no key)
    async function fetchSuggestions(query) {
      if (!query || query.length < 3) return [];
      try {
        const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=5&lang=en&lat=-37.8&lon=144.9`);
        const data = await res.json();
        return (data.features || []).map(f => {
          const p = f.properties || {};
          const parts = [p.name, p.street, p.housenumber, p.city || p.county, p.state, p.country].filter(Boolean);
          return {
            label: parts.join(", "),
            name: p.name || "",
            address: parts.join(", "),
            lat: f.geometry?.coordinates?.[1],
            lng: f.geometry?.coordinates?.[0],
          };
        });
      } catch { return []; }
    }

    function AddressAutocomplete({ value, onChange, onSelect, placeholder, className, prevStop, onEditField, stopId }) {
      const [suggestions, setSuggestions] = useState([]);
      const [showSugg, setShowSugg] = useState(false);
      const [loading, setLoading] = useState(false);
      const [timer, setTimer] = useState(null);
      const ref = React.useRef(null);

      const handleInput = (val) => {
        onChange(val);
        if (timer) clearTimeout(timer);
        setTimer(setTimeout(async () => {
          const s = await fetchSuggestions(val);
          setSuggestions(s);
          setShowSugg(s.length > 0);
        }, 300));
      };

      const pick = async (s) => {
        setShowSugg(false);
        setLoading(true);
        const updates = {
          address: s.address,
          name: s.name || s.address.split(",")[0],
          mq: s.address.replace(/\s+/g, "+"),
          lat: s.lat,
          lng: s.lng,
        };
        // Auto-detect charger
        if (isChargerName(s.label)) {
          updates.type = "charge"; updates.charge = makeChargeDefaults(); updates.emoji = "⚡";
          updates.poi = s.name.replace(/\s+/g, "+");
        }
        // Auto-calc drive stats via OSRM if prev stop available
        if (prevStop && prevStop.lat && s.lat) {
          const stats = await fetchDriveStats(prevStop.lat, prevStop.lng, s.lat, s.lng);
          Object.assign(updates, stats);
        }
        setLoading(false);
        onSelect(updates);
      };

      // Close dropdown on outside click
      React.useEffect(() => {
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setShowSugg(false); };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
      }, []);

      return (
        <div className="relative" ref={ref}>
          <input value={loading ? "⏳ Calculating route..." : value} onChange={e=>handleInput(e.target.value)}
            onFocus={()=>{ if (suggestions.length) setShowSugg(true); }}
            disabled={loading}
            placeholder={placeholder} className={`${className} ${loading ? "opacity-60" : ""}`} />
          {showSugg && (
            <div className="absolute z-30 top-full left-0 right-0 mt-1 bg-[#1a1a1a] border border-[#2a2a2a] rounded-lg shadow-xl max-h-48 overflow-y-auto">
              {suggestions.map((s, i) => (
                <button key={i} onClick={()=>pick(s)}
                  className="w-full text-left px-3 py-2 text-[11px] text-gray-300 hover:bg-[#2a2a2a] hover:text-white transition-colors border-b border-[#222] last:border-0 flex items-start gap-2">
                  <span className="text-gray-500 shrink-0 mt-0.5">📍</span>
                  <span className="leading-snug">{s.label}</span>
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    // Reverse geocode via Nominatim
    async function reverseGeocode(lat, lng) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
        const data = await res.json();
        return data.display_name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      } catch { return `${lat.toFixed(5)}, ${lng.toFixed(5)}`; }
    }

    function AddressEditModal({ stop, prevStop, nextStop, onSave, onCancel }) {

      const [suggestions, setSuggestions] = useState([]);

      const [timer, setTimer] = useState(null);
      const mapRef = React.useRef(null);
      const mapInstanceRef = React.useRef(null);
      const markerRef = React.useRef(null);
      const inputRef = React.useRef(null);

      // Initialize Leaflet map — pin fixed to center, move map to move pin
      React.useEffect(() => {
        if (!mapRef.current || mapInstanceRef.current) return;
        const map = L.map(mapRef.current, { zoomControl: true }).setView([lat, lng], 14);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: '© OpenStreetMap',
        }).addTo(map);
        let debounceTimer = null;
        map.on("moveend", () => {
          const c = map.getCenter();
          setLat(c.lat); setLng(c.lng);
          if (debounceTimer) clearTimeout(debounceTimer);
          debounceTimer = setTimeout(async () => {
            const address = await reverseGeocode(c.lat, c.lng);
            setAddr(address);
          }, 600);
        });
        mapInstanceRef.current = map;
        setTimeout(() => map.invalidateSize(), 200);
        return () => { map.remove(); mapInstanceRef.current = null; };
      }, []);

      // Move map when lat/lng change from search
      const moveMap = (newLat, newLng) => {
        setLat(newLat); setLng(newLng);

      const handleInput = (val) => {
        setAddr(val);

                  <div className="absolute top-full left-0 right-0 mt-1 bg-[#1a1a1a] border border-[#2a2a2a] rounded-lg shadow-xl max-h-40 overflow-y-auto" style={{zIndex:2000}}>

                  </div>

                              <label className="flex items-center gap-1 text-gray-500">Dist(km) <input type="number" value={stop.dist} onChange={e=>onEditField(stop.id,{dist:+e.target.value, _routeSource:undefined})}

                              {stop._routeSource === "osrm" ? "📡" : "⚠️"}
                              <span>{stop._routeSource === "osrm" ? "Auto-calculated via OSRM road routing" : "Estimated — OSRM unavailable"}{nextStop?._routeSource ? " · Next stop also updated" : ""}</span>
                              <button onClick={()=>onEditField(stop.id,{_routeSource:undefined})} className="ml-auto text-gray-500 hover:text-white">✕</button>
                            </div>
                          )}
                        </div>
                        {stop.type === "charge" && stop.charge && (
                          <div className="flex gap-2 flex-wrap text-[10px] bg-green-500/5 rounded p-1.5 border border-green-500/10">
                            <label className="flex items-center gap-1 text-gray-500">Stalls <input type="number" value={stop.charge.stalls} onChange={e=>onEditField(stop.id,{charge:{...stop.charge,stalls:+e.target.value}})}
                              className="w-10 bg-[#0a0a0a] border border-[#2a2a2a] rounded px-1 py-0.5 text-green-400" /></label>
                            <label className="flex items-center gap-1 text-gray-500">kW <input type="number" value={stop.charge.kw} onChange={e=>onEditField(stop.id,{charge:{...stop.charge,kw:+e.target.value}})}
                              className="w-12 bg-[#0a0a0a] border border-[#2a2a2a] rounded px-1 py-0.5 text-green-400" /></label>
                            <label className="flex items-center gap-1 text-gray-500">Type <input value={stop.charge.type} onChange={e=>onEditField(stop.id,{charge:{...stop.charge,type:e.target.value}})}
                              className="w-28 bg-[#0a0a0a] border border-[#2a2a2a] rounded px-1 py-0.5 text-green-400" /></label>
                          </div>
                        )}
                        <input value={stop.tip||""} onChange={e=>onEditField(stop.id,{tip:e.target.value})} placeholder="💡 Tip"
                          className="w-full bg-[#0a0a0a] border border-[#2a2a2a] rounded px-2 py-0.5 text-[10px] text-yellow-500/80" />
                      </div>
                    ) : (
                      <>
                        <div className="flex items-center gap-2 mb-1">

                        {isFirst && homeBattery !== undefined && stop.id === "d1-start" && onHomeBatteryChange && (

                        )}
                      </>
                    )}
                  </div>
                  {!editMode && (
                    <>
                      <div className="px-3.5 py-1.5 bg-[#0d0d0d] flex items-center gap-3 flex-wrap text-[11px]">
                        {routeLoading ? (
                          <span className="text-gray-500 flex items-center gap-1.5"><InlineSpinner /> <span className="text-[10px]">Calculating route...</span></span>
                        ) : (
                          <>{stop.dist>0 && <span className="text-gray-400">🚗 {stop.dist}km · {fmt(stop.drive)}</span>}</>
                        )}
                        {(!isFirst || stop.id !== "d1-start") && (
                          routeLoading ? null : <span className="text-gray-400 flex items-center"><BatteryGauge pct={battArr} /></span>
                        )}
                        {isCh && stop.charge && (
                          <span className="ml-auto text-green-400 text-[10px] font-medium px-2 py-0.5 rounded-full bg-green-400/10 border border-green-400/20">
                            {stop.charge.type} ({stop.charge.kw}kW) → {Math.round(battDep)}%
                          </span>
                        )}
                      </div>
                      {isCh && stop.charge && (
                        <div className="px-3.5 py-2 bg-green-500/5 border-t border-green-500/10">
                          <div className="flex items-center gap-3 flex-wrap text-[11px]">
                            <span className="text-[9px] font-bold px-1.5 py-0.5 rounded-full" style={{background:"#22c55e22",color:"#22c55e",border:"1px solid #22c55e44"}}>Operational</span>
                            <span><span className="text-gray-500">Stalls: </span><span className="text-green-400">{stop.charge.stalls}</span></span>
                            <span><span className="text-gray-500">Charger: </span><span className="text-green-400">{stop.charge.kw} kW</span></span>
                            <span><span className="text-gray-500">+{Math.round(battDep - battArr)}% </span><span className="text-gray-600">in {fmt(stop.stay)}</span></span>
                            <span><span className="text-gray-500">Depart: </span><BatteryGauge pct={battDep} /></span>
                          </div>

                  )}
                </div>
                {/* Right: Google Maps link */}
                <a href={mapLink(stop)} target="_blank" rel="noopener noreferrer"
                  className="hidden md:flex w-20 shrink-0 border-l border-[#2a2a2a] items-center justify-center bg-[#0d0d0d] hover:bg-[#1a1a1a] transition-colors group cursor-pointer"
                  title="Open in Google Maps">
                  <div className="flex flex-col items-center gap-1.5 opacity-40 group-hover:opacity-100 transition-opacity">
                    <span className="text-2xl">📍</span>
                    <span className="text-[10px] text-gray-400 group-hover:text-white font-semibold">Maps</span>

              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Weather (Open-Meteo, free, no key) ──
    const WMO_WEATHER = {
      0:"☀️ Clear", 1:"🌤️ Mostly Clear", 2:"⛅ Partly Cloudy", 3:"☁️ Overcast",
      45:"🌫️ Fog", 48:"🌫️ Fog",
      51:"🌦️ Drizzle", 53:"🌦️ Drizzle", 55:"🌦️ Heavy Drizzle",
      61:"🌧️ Light Rain", 63:"🌧️ Rain", 65:"🌧️ Heavy Rain",
      71:"❄️ Light Snow", 73:"❄️ Snow", 75:"❄️ Heavy Snow",
      80:"🌦️ Showers", 81:"🌦️ Showers", 82:"🌧️ Heavy Showers",
      95:"⛈️ Thunderstorm", 96:"⛈️ Hail Storm", 99:"⛈️ Hail Storm",
    };
    function wmoToWeather(code) { return WMO_WEATHER[code] || "❓ Unknown"; }
    // "Worst" weather = highest code number
    function worstWeatherCode(codes) { return codes.length > 0 ? Math.max(...codes) : 0; }

    function parseDate(dateStr) {
      try {
        const cleaned = dateStr.replace(/^[A-Za-z]+,\s*/, "");
        const parsed = new Date(cleaned + " 12:00:00");
        if (!isNaN(parsed)) {
          const y = parsed.getFullYear(), m = String(parsed.getMonth()+1).padStart(2,"0"), d = String(parsed.getDate()).padStart(2,"0");
          return `${y}-${m}-${d}`;
        }
      } catch {}
      return null;
    }

    // stopsWithTimes: [{...stop, arriveHour, departHour}]
    async function fetchDayWeather(stopsWithTimes, dateStr) {
      const targetDate = parseDate(dateStr);
      const seen = {};  // key -> hourly data cache
      const results = [];

      for (const s of stopsWithTimes) {
        if (!s.lat || !s.lng) { results.push({ stopId: s.id }); continue; }
        const key = `${Math.round(s.lat*2)/2},${Math.round(s.lng*2)/2}`;
        let hourlyData = seen[key];
        if (!hourlyData) {
          try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lng}&hourly=temperature_2m,weathercode,uv_index&timezone=auto&forecast_days=14`);
            const data = await res.json();
            if (data.hourly) { hourlyData = data.hourly; seen[key] = hourlyData; }
          } catch {}
        }
        if (!hourlyData) { results.push({ stopId: s.id }); continue; }

        // Find hourly indices matching the stop's arrival-departure window on target date
        const arrH = Math.max(0, Math.min(23, Math.floor(s.arriveHour ?? 8)));
        const depH = Math.max(arrH, Math.min(23, Math.ceil(s.departHour ?? arrH + 1)));
        const matchIndices = [];
        for (let h = arrH; h <= depH; h++) {
          const timeStr = `${targetDate || hourlyData.time[0]?.slice(0,10)}T${String(h).padStart(2,"0")}:00`;
          const idx = hourlyData.time.indexOf(timeStr);
          if (idx >= 0) matchIndices.push(idx);
        }
        // Fallback: if no match, use the arrival hour on day 0
        if (matchIndices.length === 0) {
          const fallbackIdx = Math.min(arrH, (hourlyData.time?.length || 1) - 1);
          matchIndices.push(fallbackIdx);
        }

        const temps = matchIndices.map(i => hourlyData.temperature_2m[i]).filter(t => t != null);
        const codes = matchIndices.map(i => hourlyData.weathercode[i]).filter(c => c != null);
        const uvs = matchIndices.map(i => hourlyData.uv_index?.[i]).filter(u => u != null);
        const worstCode = worstWeatherCode(codes);

        results.push({
          stopId: s.id,
          high: temps.length > 0 ? Math.round(Math.max(...temps)) : null,
          low: temps.length > 0 ? Math.round(Math.min(...temps)) : null,
          uv: uvs.length > 0 ? Math.round(Math.max(...uvs)) : null,
          weatherCode: worstCode,
          weatherLabel: wmoToWeather(worstCode),
        });
      }

      // Aggregate for the day
      const valid = results.filter(r => r.weatherLabel);
      if (valid.length === 0) return { stops: results, day: null };
      const allCodes = valid.map(r => r.weatherCode);
      const dayWorst = worstWeatherCode(allCodes);
      return {
        stops: results,
        day: {
          high: Math.max(...valid.filter(r=>r.high!=null).map(r=>r.high)),
          low: Math.min(...valid.filter(r=>r.low!=null).map(r=>r.low)),
          uv: Math.max(...valid.filter(r=>r.uv!=null).map(r=>r.uv)),
          weatherCode: dayWorst,
          weatherLabel: wmoToWeather(dayWorst),
        }
      };
    }

    function WeatherBadge({ dayWeather, loading, onRefresh }) {
      const w = dayWeather;
      return (
        <div className="bg-black/30 rounded-lg px-3 py-1.5 flex items-center gap-3">
          <div>
            <div className="text-[9px] text-gray-500 uppercase tracking-wider">Temp</div>
            {loading ? (
              <div className="text-sm font-bold text-gray-500">...</div>
            ) : w ? (
              <div className="text-sm font-bold">
                <span className="text-orange-400">{w.high}°</span>
                <span className="text-gray-500"> / </span>
                <span className="text-blue-400">{w.low}°</span>
              </div>
            ) : (
              <div className="text-sm font-bold text-gray-600">N/A</div>
            )}
          </div>
          {!loading && w && (
            <div>
              <div className="text-[9px] text-gray-500 uppercase tracking-wider">Forecast</div>
              <div className="text-sm font-bold text-white">{w.weatherLabel}</div>
            </div>
          )}
          {!loading && w && w.uv !== null && (
            <div>
              <div className="text-[9px] text-gray-500 uppercase tracking-wider">UV</div>
              <div className="text-sm font-bold" style={{color: w.uv >= 8 ? "#ef4444" : w.uv >= 3 ? "#f59e0b" : "#4ade80"}}>
                {w.uv}
              </div>
            </div>
          )}

        </div>
      );
    }

    const InlineSpinner = () => (
      <span className="inline-block w-3 h-3 border-[1.5px] border-gray-500 border-t-transparent rounded-full animate-spin" />
    );

    function StopWeatherTag({ weather, loading }) {
      if (loading) return <span className="ml-auto shrink-0"><InlineSpinner /></span>;
      if (!weather || !weather.weatherLabel) return null;
      return (
        <span className="text-[10px] text-gray-400 ml-auto shrink-0">{weather.weatherLabel}</span>
      );
    }

    const DAY_COLORS = ["#3b82f6","#14b8a6","#a855f7","#f59e0b","#ef4444","#ec4899","#8b5cf6","#06b6d4"];

    function DaySection({day, onChange, startH, startM, onStartTime, homeBattery, onHomeBatteryChange, editMode, onDelete, onEditField, onAddStop, onEditDay, onDeleteDay, onDayDragStart, onDayDragEnd, recalcStopIds, setRecalcStopIds}) {
      const [open, setOpen] = useState(true);
      const st = dayStats(day.stops);
      const levels = useMemo(() => {
        let b = day.startBattery, el=0, out=[];
        day.stops.forEach(s => {
          b -= s.batt; el += s.drive;
          const arr=b, t=timeOfDay(startH, startM + el);
          let dep=arr;
          if(s.type==="charge" && s.charge) {
            dep = calcChargedSOC(arr, s.charge.kw, s.stay);
            b = dep;
          }
          out.push({arr,dep,t}); el+=s.stay;
        });
        return out;
      }, [day, startH, startM]);
      const endT = useMemo(()=>timeOfDay(startH, startM + day.stops.reduce((s,x)=>s+x.drive+x.stay,0)), [day,startH,startM]);
      // Key for route map iframe to force re-render on stop changes
      const routeKey = useMemo(() => day.stops.map(s => s.mq || s.id).join("|"), [day.stops]);

      // Weather data for the day and all stops — re-fetch when locations change
      const [weatherData, setWeatherData] = useState(null);
      const [weatherLoading, setWeatherLoading] = useState(true);
      const [weatherLoadingIds, setWeatherLoadingIds] = useState(new Set());
      const stopsLocationKey = useMemo(() => day.stops.map(s => `${s.id}:${s.lat},${s.lng}`).join("|"), [day.stops]);
      const fetchWeather = async () => {
        setWeatherLoading(true);
        const allIds = new Set(day.stops.map(s => s.id));
        setWeatherLoadingIds(allIds);
        // Build stops with arrival/departure hours
        let elapsed = 0;
        const stopsWithTimes = day.stops.map(s => {
          elapsed += s.drive || 0;
          const arriveHour = startH + (startM + elapsed) / 60;
          const departHour = arriveHour + (s.stay || 0) / 60;
          elapsed += s.stay || 0;
          return { ...s, arriveHour, departHour };
        });
        const w = await fetchDayWeather(stopsWithTimes, day.date);
        setWeatherData(w);
        setWeatherLoadingIds(new Set());
        setWeatherLoading(false);
      };
      // Re-fetch when locations or timing changes
      const stopsTimingKey = useMemo(() => day.stops.map(s => `${s.drive}:${s.stay}`).join("|"), [day.stops]);
      React.useEffect(() => { if (day.stops.length > 0) fetchWeather(); }, [stopsLocationKey, stopsTimingKey, startH, startM]);

      // Drag state for stop reordering
      const [dragId, setDragId] = useState(null);
      const [hoverIdx, setHoverIdx] = useState(null);
      const draggedStop = dragId ? day.stops.find(s => s.id === dragId) : null;

      const handleDrop = async (dropIdx) => {
        if (!dragId) return;
        const fromIdx = day.stops.findIndex(s => s.id === dragId);
        if (fromIdx === -1 || fromIdx === dropIdx) { setDragId(null); setHoverIdx(null); return; }
        const newStops = [...day.stops];
        const [moved] = newStops.splice(fromIdx, 1);
        const insertIdx = dropIdx > fromIdx ? dropIdx - 1 : dropIdx;
        newStops.splice(insertIdx, 0, moved);
        onEditDay(day.day, { stops: newStops });
        setDragId(null); setHoverIdx(null);
        // Collect IDs that need recalculation
        const affectedIds = new Set();
        [insertIdx, insertIdx + 1].forEach(idx => { if (idx > 0 && idx < newStops.length) affectedIds.add(newStops[idx].id); });
        if (insertIdx === 0 && newStops[0]) affectedIds.add(newStops[0].id);
        setRecalcStopIds(affectedIds);
        // Recalculate routes
        for (const idx of [insertIdx, insertIdx + 1]) {
          if (idx <= 0 || idx >= newStops.length) continue;
          const prev = newStops[idx - 1], curr = newStops[idx];
          if (prev?.lat && prev?.lng && curr?.lat && curr?.lng) {
            const stats = await fetchDriveStats(prev.lat, prev.lng, curr.lat, curr.lng);
            onEditField(curr.id, stats);
          }
        }
        if (insertIdx === 0 && newStops[0]) {
          onEditField(newStops[0].id, { dist: 0, drive: 0, batt: 0, _routeSource: undefined });
        }
        setRecalcStopIds(new Set());
      };

      const DragHandle = ({stopId}) => (
        <div className="flex items-center justify-center py-1.5 cursor-grab active:cursor-grabbing bg-[#0d0d0d] hover:bg-[#1a1a1a] border-b border-[#2a2a2a] transition-colors rounded-t-xl"
          draggable="true"
          onDragStart={e => {
            e.dataTransfer.setData("stopId", stopId);
            e.dataTransfer.effectAllowed = "move";
            requestAnimationFrame(() => setDragId(stopId));
          }}
          onDragEnd={()=>{ setDragId(null); setHoverIdx(null); }}>
          <div className="flex flex-col gap-[3px] opacity-40">
            <div className="w-5 h-[2px] bg-gray-400 rounded" />
            <div className="w-5 h-[2px] bg-gray-400 rounded" />
            <div className="w-5 h-[2px] bg-gray-400 rounded" />
          </div>
        </div>
      );

      const DropZone = ({idx}) => (
        <div className="flex gap-0 -mt-1 mb-1 relative z-10"
          onDragOver={e => { e.preventDefault(); setHoverIdx(idx); }}
          onDragLeave={()=> setHoverIdx(null)}
          onDrop={e => { e.preventDefault(); handleDrop(idx); }}>
          <div className="w-20 shrink-0" />
          <div className="flex-1 py-1">
            <div className={`w-full py-2 rounded-xl border-2 border-dashed transition-all flex items-center justify-center text-[11px] font-medium ${
              hoverIdx === idx ? "border-blue-500 bg-blue-500/10 text-blue-400" : "border-[#2a2a2a] text-gray-600"
            }`}>
              {hoverIdx === idx && draggedStop ? (
                <span className="opacity-50">📍 {draggedStop.name}</span>
              ) : "Drop here"}
            </div>
          </div>
        </div>
      );

      return (
        <div className="mb-7">
          <div className={`w-full ${day.gradient} rounded-2xl p-5 mb-3 text-left border border-[#2a2a2a] card-glow relative cursor-pointer`} onClick={()=>setOpen(!open)}>
            {editMode && (
              <button onClick={(e) => { e.stopPropagation(); onDeleteDay(day.day); }}
                className="absolute -top-2 -right-2 w-6 h-6 rounded-full bg-red-500 hover:bg-red-400 text-white text-[10px] font-bold flex items-center justify-center z-20 shadow transition-colors"
                title="Delete day">✕</button>
            )}
            {editMode && (
              <div className="flex items-center justify-center py-1.5 -mx-5 -mt-5 mb-3 cursor-grab active:cursor-grabbing rounded-t-2xl bg-black/20 hover:bg-black/30 transition-colors"
                draggable="true"
                onClick={e => e.stopPropagation()}
                onDragStart={e => {
                  e.dataTransfer.setData("daynum", String(day.day));
                  e.dataTransfer.effectAllowed = "move";
                  if (onDayDragStart) onDayDragStart(day.day);
                }}
                onDragEnd={() => { if (onDayDragEnd) onDayDragEnd(); }}
              >
                <div className="flex flex-col gap-[3px] opacity-40">
                  <div className="w-6 h-[2px] bg-gray-400 rounded" />
                  <div className="w-6 h-[2px] bg-gray-400 rounded" />
                  <div className="w-6 h-[2px] bg-gray-400 rounded" />
                </div>
              </div>
            )}
            <div className="flex items-start justify-between">
              <div className="flex-1">
                {editMode ? (
                  <div className="space-y-2" onClick={e=>e.stopPropagation()}>
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="text-[11px] font-bold px-3 py-1 rounded-full" style={{background:day.color,color:"#000"}}>DAY {day.day}</span>
                      <div className="flex gap-1">
                        {DAY_COLORS.map(c=>(
                          <button key={c} onClick={()=>onEditDay(day.day,{color:c})}
                            className={`w-5 h-5 rounded-full border-2 transition-all ${c===day.color?"border-white scale-110":"border-transparent opacity-60 hover:opacity-100"}`}
                            style={{background:c}} />
                        ))}
                      </div>
                    </div>
                    <input type="date" value={parseDate(day.date) || ""} onChange={e=>{
                      const d = new Date(e.target.value + "T12:00:00");
                      if (!isNaN(d)) onEditDay(day.day, {date: d.toLocaleDateString("en-AU", {weekday:"long", day:"numeric", month:"long", year:"numeric"})});
                    }} className="bg-black/30 border border-white/10 rounded px-2 py-1 text-[11px] text-gray-300" />
                    <input value={day.title} onChange={e=>onEditDay(day.day,{title:e.target.value})}
                      className="w-full bg-black/30 border border-white/10 rounded px-2 py-1.5 text-base font-bold text-white" placeholder="Day title" />
                    <input value={day.subtitle} onChange={e=>onEditDay(day.day,{subtitle:e.target.value})}
                      className="w-full bg-black/30 border border-white/10 rounded px-2 py-1 text-sm text-gray-400" placeholder="Subtitle" />
                  </div>
                ) : (
                  <>
                    <div className="flex items-center gap-3 mb-2">
                      <span className="text-[11px] font-bold px-3 py-1 rounded-full" style={{background:day.color,color:"#000"}}>DAY {day.day}</span>
                      <span className="text-[11px] text-gray-400">{day.date}</span>
                    </div>
                    <h2 className="text-lg font-bold text-white mb-0.5">{day.title}</h2>
                    <p className="text-sm text-gray-400">{day.subtitle}</p>
                  </>
                )}
              </div>
            </div>
            <div className="flex gap-3 mt-3 flex-wrap">
              {[["Distance",`${st.dist} km`,"white"],["Drive",fmt(st.drv),"white"],["Activities",fmt(st.stay),"#60a5fa"],["Charging",fmt(st.chrg),"#4ade80"],["Schedule",`${timeOfDay(startH,startM)} → ${endT}`,"white"]].map(([l,v,c])=>(
                <div key={l} className="bg-black/30 rounded-lg px-3 py-1.5">
                  <div className="text-[9px] text-gray-500 uppercase tracking-wider">{l}</div>
                  <div className="text-sm font-bold" style={{color:c}}>{v}</div>
                </div>
              ))}
              {day.stops.length > 0 && <WeatherBadge dayWeather={weatherData?.day} loading={weatherLoading} onRefresh={fetchWeather} />}
            </div>
            {/* Day route map inside banner */}
            {day.stops.length > 0 && (
              <div className="-mx-5 mt-4 overflow-hidden" style={{height:"180px"}} onClick={e=>e.stopPropagation()}>
                <iframe key={routeKey}
                  src={`https://maps.google.com/maps?saddr=${day.stops[0].mq}&daddr=${day.stops.slice(1).map(s=>s.mq).join("+to:")}&output=embed`}
                  className="w-full h-full" style={{border:0,pointerEvents:"auto"}} loading="lazy" title={`Day ${day.day} route`}
                  allowFullScreen />
              </div>
            )}
            {/* Expand/collapse strip */}
            <div className={`-mx-5 -mb-5 ${day.stops.length === 0 ? "mt-4" : ""} rounded-b-2xl py-1.5 flex items-center justify-center gap-2 transition-all ${
              open ? "bg-white/5" : "bg-black/20 hover:bg-black/30"
            }`} style={{borderTop:`1px solid ${day.color}33`}}>
              <span className={`text-[10px] transition-transform inline-block ${open ? "rotate-180" : ""}`} style={{color:day.color}}>▼</span>
              <span className="text-[10px] font-medium" style={{color: open ? day.color : "#999"}}>
                {open ? "Hide stops" : `Show ${day.stops.length} stop${day.stops.length !== 1 ? "s" : ""}`}
              </span>
              <span className={`text-[10px] transition-transform inline-block ${open ? "rotate-180" : ""}`} style={{color:day.color}}>▼</span>
            </div>
          </div>
          {open && <div className="ml-2">
            {editMode && day.stops.length > 0 && (
              <div className="flex justify-center pb-2">
                <div className="flex items-center gap-1.5 bg-[#141414] border border-[#2a2a2a] rounded-lg px-3 py-1">
                  <span className="text-[9px] text-gray-500 uppercase tracking-wider font-medium">🕐 Depart</span>
                  <div className="flex items-center bg-[#0a0a0a] rounded border border-[#2a2a2a] overflow-hidden">
                    <select value={startH} onChange={e=>onStartTime(+e.target.value, null)}
                      onClick={e=>e.stopPropagation()}
                      className="bg-transparent px-1 py-0.5 text-sm font-bold text-center appearance-none focus:outline-none cursor-pointer"
                      style={{color:day.color, width:"40px"}}>
                      {Array.from({length:19},(_,i)=>i+5).map(h=><option key={h} value={h}>{String(h).padStart(2,"0")}</option>)}
                    </select>
                    <span className="text-sm font-bold" style={{color:day.color}}>:</span>
                    <select value={startM} onChange={e=>onStartTime(null, +e.target.value)}
                      onClick={e=>e.stopPropagation()}
                      className="bg-transparent px-1 py-0.5 text-sm font-bold text-center appearance-none focus:outline-none cursor-pointer"
                      style={{color:day.color, width:"40px"}}>
                      {[0,5,10,15,20,25,30,35,40,45,50,55].map(m=><option key={m} value={m}>{String(m).padStart(2,"0")}</option>)}
                    </select>
                  </div>
                  <span className="text-[9px] text-gray-600">{startH >= 12 ? "PM" : "AM"}</span>
                </div>
              </div>
            )}
            {editMode && day.stops.length === 0 && <AddStopButton onClick={()=>onAddStop(day.day, 0)} />}
            {day.stops.map((s,i)=>(
              <React.Fragment key={s.id}>
                {dragId && <DropZone idx={i} />}
                <div className={dragId === s.id ? "opacity-30" : ""}>
                  <StopCard stop={s} battArr={levels[i].arr} battDep={levels[i].dep} arrTime={levels[i].t} onChange={onChange} color={day.color} homeBattery={homeBattery} onHomeBatteryChange={onHomeBatteryChange} editMode={editMode} onDelete={onDelete} onEditField={onEditField} prevStop={i > 0 ? day.stops[i-1] : null} nextStop={i < day.stops.length - 1 ? day.stops[i+1] : null}
                    dragHandle={editMode ? <DragHandle stopId={s.id} /> : null} isLast={i === day.stops.length - 1}
                    stopWeather={weatherData?.stops?.find(w => w.stopId === s.id)}
                    routeLoading={recalcStopIds.has(s.id)} weatherLoading={weatherLoadingIds.has(s.id)} setRecalcStopIds={setRecalcStopIds} />
                </div>
                {!dragId && editMode && <AddStopButton onClick={()=>onAddStop(day.day, i + 1)} />}
              </React.Fragment>
            ))}
            {dragId && <DropZone idx={day.stops.length} />}
          </div>}
        </div>
      );
    }

    // Simulate a full day and return the final battery %
    function simulateDayEndBattery(day) {
      let b = day.startBattery;
      for (const s of day.stops) {
        b -= s.batt;
        if (s.type === "charge" && s.charge) {
          b = calcChargedSOC(b, s.charge.kw, s.stay);
        }
      }
      return b;
    }

    // ── Share/Export/Import helpers ──
    function encodeTrip(data) {
      return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    }
    function decodeTrip(str) {
      return JSON.parse(decodeURIComponent(escape(atob(str))));
    }
    function loadFromHash() {
      try {
        const hash = window.location.hash.slice(1);
        if (hash && hash.startsWith("trip=")) return decodeTrip(hash.slice(5));
      } catch {}
      return null;
    }

    function App() {
      // Load from URL hash first, then localStorage, then defaults
      const initialLoad = useMemo(() => {
        const fromHash = loadFromHash();
        if (fromHash) return fromHash;
        try {
          const s = localStorage.getItem("tripDays");
          if (s) return {
            days: JSON.parse(s),
            heroTitle: localStorage.getItem("heroTitle") || "Great Ocean Road",
            heroSubtitle: localStorage.getItem("heroSubtitle") || "& Beyond Adventure",
            heroSnippet: localStorage.getItem("heroSnippet") || "Melbourne → Geelong → Great Ocean Road → Warrnambool → Mount Gambier → Naracoorte → Pink Lake → Home",
          };
        } catch {}
        return null;
      }, []);

      const [days, setDays] = useState(() => initialLoad?.days || initialDays);
      const [startTimes, setStartTimes] = useState(() => {
        try { const s = localStorage.getItem("tripStartTimes"); return s ? JSON.parse(s) : [{h:11,m:0},{h:10,m:0},{h:10,m:0},{h:9,m:0}]; } catch { return [{h:11,m:0},{h:10,m:0},{h:10,m:0},{h:9,m:0}]; }
      });
      const [homeBattery, setHomeBattery] = useState(() => {
        try { const s = localStorage.getItem("tripHomeBattery"); return s ? +s : 85; } catch { return 85; }
      });
      const [editMode, setEditMode] = useState(false);
      const [shareMsg, setShareMsg] = useState(null);
      const [showResetConfirm, setShowResetConfirm] = useState(false);
      const onResetToDefaults = () => {
        localStorage.removeItem("tripDays"); localStorage.removeItem("heroTitle"); localStorage.removeItem("heroSubtitle");
        localStorage.removeItem("heroSnippet"); localStorage.removeItem("tripStartTimes"); localStorage.removeItem("tripHomeBattery");
        localStorage.removeItem("tripComments");
        setDays(initialDays); setHeroTitle("Great Ocean Road"); setHeroSubtitle("& Beyond Adventure");
        setHeroSnippet("Melbourne → Geelong → Great Ocean Road → Warrnambool → Mount Gambier → Naracoorte → Pink Lake → Home");
        setStartTimes([{h:11,m:0},{h:10,m:0},{h:10,m:0},{h:9,m:0}]); setHomeBattery(85);
        setShowResetConfirm(false); setEditMode(false);
      };
      const [recalcStopIds, setRecalcStopIds] = useState(new Set());
      const [dragDayNum, setDragDayNum] = useState(null);
      const [hoverDayIdx, setHoverDayIdx] = useState(null);
      const [heroTitle, setHeroTitle] = useState(() => initialLoad?.heroTitle || localStorage.getItem("heroTitle") || "Great Ocean Road");
      const [heroSubtitle, setHeroSubtitle] = useState(() => initialLoad?.heroSubtitle || localStorage.getItem("heroSubtitle") || "& Beyond Adventure");
      const [heroSnippet, setHeroSnippet] = useState(() => initialLoad?.heroSnippet || localStorage.getItem("heroSnippet") || "Melbourne → Geelong → Great Ocean Road → Warrnambool → Mount Gambier → Naracoorte → Pink Lake → Home");

      // Undo/redo history (max 10 steps)
      const editHistory = React.useRef([]);
      const historyIdx = React.useRef(-1);
      const isUndoRedo = React.useRef(false);
      const [canUndo, setCanUndo] = useState(false);
      const [canRedo, setCanRedo] = useState(false);

      const getSnapshot = () => JSON.parse(JSON.stringify({ days, heroTitle, heroSubtitle, heroSnippet }));
      const applySnapshot = (snap) => {
        isUndoRedo.current = true;
        setDays(snap.days); setHeroTitle(snap.heroTitle); setHeroSubtitle(snap.heroSubtitle); setHeroSnippet(snap.heroSnippet);
        setTimeout(() => { isUndoRedo.current = false; }, 50);
      };

      // Record history on state changes during edit mode
      React.useEffect(() => {
        if (!editMode || isUndoRedo.current) return;
        const snap = getSnapshot();
        const h = editHistory.current;
        // Trim any redo states ahead of current position
        editHistory.current = h.slice(0, historyIdx.current + 1);
        editHistory.current.push(snap);
        if (editHistory.current.length > 11) editHistory.current.shift(); // keep max 10 + initial
        historyIdx.current = editHistory.current.length - 1;
        setCanUndo(historyIdx.current > 0);
        setCanRedo(false);
      }, [days, heroTitle, heroSubtitle, heroSnippet, editMode]);

      const onUndo = () => {
        if (historyIdx.current <= 0) return;
        historyIdx.current--;
        applySnapshot(editHistory.current[historyIdx.current]);
        setCanUndo(historyIdx.current > 0);
        setCanRedo(true);
      };

      const onRedo = () => {
        if (historyIdx.current >= editHistory.current.length - 1) return;
        historyIdx.current++;
        applySnapshot(editHistory.current[historyIdx.current]);
        setCanUndo(historyIdx.current > 0);
        setCanRedo(historyIdx.current < editHistory.current.length - 1);
      };

      React.useEffect(() => { localStorage.setItem("tripStartTimes", JSON.stringify(startTimes)); }, [startTimes]);
      React.useEffect(() => { localStorage.setItem("tripHomeBattery", String(homeBattery)); }, [homeBattery]);
      React.useEffect(() => { localStorage.setItem("heroTitle", heroTitle); }, [heroTitle]);
      React.useEffect(() => { localStorage.setItem("heroSubtitle", heroSubtitle); }, [heroSubtitle]);
      React.useEffect(() => { localStorage.setItem("heroSnippet", heroSnippet); }, [heroSnippet]);

      // Auto-scroll when dragging near viewport edges
      // (Chrome/Edge block scroll wheel during HTML5 drag, so edge-scroll is the only way)
      React.useEffect(() => {
        let scrollRAF = null;
        let scrollSpeed = 0;
        const EDGE = 150; // large zone for easy scrolling
        const MAX_SPEED = 20;

        const doScroll = () => {
          if (scrollSpeed !== 0) {
            window.scrollBy(0, scrollSpeed);
            scrollRAF = requestAnimationFrame(doScroll);
          }
        };

        const handleDragOver = (e) => {
          e.preventDefault();
          const y = e.clientY;
          const h = window.innerHeight;
          let newSpeed = 0;
          if (y < EDGE) {
            newSpeed = -MAX_SPEED * Math.pow(1 - y / EDGE, 1.5);
          } else if (y > h - EDGE) {
            newSpeed = MAX_SPEED * Math.pow(1 - (h - y) / EDGE, 1.5);
          }
          if (newSpeed !== 0 && scrollSpeed === 0) {
            scrollSpeed = newSpeed;
            scrollRAF = requestAnimationFrame(doScroll);
          } else {
            scrollSpeed = newSpeed;
          }
          if (newSpeed === 0 && scrollRAF) {
            cancelAnimationFrame(scrollRAF);
            scrollRAF = null;
            scrollSpeed = 0;
          }
        };

        const stopScroll = () => {
          scrollSpeed = 0;
          if (scrollRAF) { cancelAnimationFrame(scrollRAF); scrollRAF = null; }
        };

        // Scroll wheel during drag (works in Firefox; Chrome/Edge block it)
        let isDragging = false;
        const onDragStart = () => { isDragging = true; };
        const onDragEndGlobal = () => { isDragging = false; stopScroll(); };
        const onWheel = (e) => { if (isDragging) { window.scrollBy(0, e.deltaY); } };

        window.addEventListener("dragover", handleDragOver);
        window.addEventListener("dragstart", onDragStart, true);
        window.addEventListener("dragend", onDragEndGlobal);
        window.addEventListener("drop", onDragEndGlobal);
        window.addEventListener("wheel", onWheel, { passive: true });
        return () => {
          window.removeEventListener("dragover", handleDragOver);
          window.removeEventListener("dragstart", onDragStart, true);
          window.removeEventListener("dragend", onDragEndGlobal);
          window.removeEventListener("drop", onDragEndGlobal);
          window.removeEventListener("wheel", onWheel);
          stopScroll();
        };
      }, []);

      // Persist days to localStorage
      React.useEffect(() => { localStorage.setItem("tripDays", JSON.stringify(days)); }, [days]);

      // Chain battery across days: each day's startBattery = previous day's ending battery
      const daysWithBattery = useMemo(() => {
        const result = [];
        for (let i = 0; i < days.length; i++) {
          if (i === 0) {
            result.push({ ...days[i], startBattery: homeBattery });
          } else {
            const prevEnd = simulateDayEndBattery(result[i - 1]);
            result.push({ ...days[i], startBattery: prevEnd });
          }
        }
        return result;
      }, [days, homeBattery]);

      const onChange = (id, val) => setDays(p=>p.map(d=>({...d,stops:d.stops.map(s=>s.id===id?{...s,stay:val}:s)})));
      const onStartTime = (i, h, m) => setStartTimes(p=>{const n=[...p];n[i]={h:h??n[i]?.h??8,m:m??n[i]?.m??0};return n;});

      const onDelete = async (id) => {
        // Find affected stops before deleting
        let nextStopToRecalc = null, newPrevStop = null, dayNum = null;
        for (const day of days) {
          const idx = day.stops.findIndex(s => s.id === id);
          if (idx === -1) continue;
          dayNum = day.day;
          newPrevStop = idx > 0 ? day.stops[idx - 1] : null;
          nextStopToRecalc = idx < day.stops.length - 1 ? day.stops[idx + 1] : null;
          break;
        }
        // Remove the stop
        setDays(p => p.map(d => ({...d, stops: d.stops.filter(s => s.id !== id)})));
        // Recalculate the next stop's route from its new previous stop
        if (nextStopToRecalc && nextStopToRecalc.lat && nextStopToRecalc.lng) {
          setRecalcStopIds(new Set([nextStopToRecalc.id]));
          if (newPrevStop && newPrevStop.lat && newPrevStop.lng) {
            const stats = await fetchDriveStats(newPrevStop.lat, newPrevStop.lng, nextStopToRecalc.lat, nextStopToRecalc.lng);
            setDays(p => p.map(d => ({...d, stops: d.stops.map(s => s.id === nextStopToRecalc.id ? {...s, ...stats} : s)})));
          } else {
            setDays(p => p.map(d => ({...d, stops: d.stops.map(s => s.id === nextStopToRecalc.id ? {...s, dist:0, drive:0, batt:0, _routeSource:undefined} : s)})));
          }
          setRecalcStopIds(new Set());
        }
      };

      const onEditField = (id, updates) => setDays(p=>p.map(d=>({...d,stops:d.stops.map(s=>s.id===id?{...s,...updates}:s)})));

      const fileInputRef = React.useRef(null);

      const onShareURL = () => {
        const data = { days, heroTitle, heroSubtitle, heroSnippet };
        const encoded = encodeTrip(data);
        const url = window.location.origin + window.location.pathname + "#trip=" + encoded;
        navigator.clipboard.writeText(url).then(() => {
          setShareMsg("✓ Link copied to clipboard!");
          setTimeout(() => setShareMsg(null), 3000);
        }).catch(() => {
          prompt("Copy this link:", url);
        });
      };

      const onExportJSON = () => {
        const data = { days, heroTitle, heroSubtitle, heroSnippet, startTimes, homeBattery };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `trip-plan-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
      };

      const onImportJSON = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(reader.result);
            if (data.days) setDays(data.days);
            if (data.heroTitle) setHeroTitle(data.heroTitle);
            if (data.heroSubtitle) setHeroSubtitle(data.heroSubtitle);
            if (data.heroSnippet) setHeroSnippet(data.heroSnippet);
            if (data.startTimes) setStartTimes(data.startTimes);
            if (data.homeBattery) setHomeBattery(data.homeBattery);
            setShareMsg("✓ Trip imported!");
            setTimeout(() => setShareMsg(null), 3000);
          } catch { alert("Invalid trip file"); }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      const onAddStop = (dayNum, index) => {
        const newStop = {
          id: `custom-${Date.now()}`, name: "New Stop", type: "attraction",
          desc: "", stay: 30, min: 10, max: 120,
          dist: 0, drive: 0, batt: 0, emoji: "📍",
          lat: -37.8, lng: 144.0, mq: "Melbourne+VIC",
        };
        setDays(p => p.map(d => {
          if (d.day !== dayNum) return d;
          const stops = [...d.stops];
          stops.splice(index, 0, newStop);
          return { ...d, stops };
        }));
      };

      const toggleEditMode = () => {
        if (!editMode) {
          // Entering edit mode — initialize history with current state
          editHistory.current = [getSnapshot()];
          historyIdx.current = 0;
          setCanUndo(false); setCanRedo(false);
        }
        setEditMode(!editMode);
      };

      const onEditDay = (dayNum, updates) => setDays(p => p.map(d => d.day === dayNum ? { ...d, ...updates } : d));

      const onReorderDay = (fromDay, toDay) => {
        setDays(p => {
          const arr = [...p];
          const fromIdx = arr.findIndex(d => d.day === fromDay);
          const toIdx = arr.findIndex(d => d.day === toDay);
          if (fromIdx === -1 || toIdx === -1) return p;
          const [moved] = arr.splice(fromIdx, 1);
          arr.splice(toIdx, 0, moved);
          return arr.map((d, i) => ({ ...d, day: i + 1 }));
        });
      };

      const onDeleteDay = (dayNum) => {
        setDays(p => p.filter(d => d.day !== dayNum).map((d, i) => ({ ...d, day: i + 1 })));
      };

      const onAddDay = () => {
        const newDayNum = days.length + 1;
        setDays(p => [...p, {
          day: newDayNum, date: `Day ${newDayNum}`, title: "New Day",
          subtitle: "Plan your stops", color: DAY_COLORS[(newDayNum - 1) % DAY_COLORS.length],
          gradient: `day-gradient-${((newDayNum - 1) % 4) + 1}`, startBattery: 100,
          stops: []
        }]);
      };

      const totals = useMemo(()=>{
        let d=0,dr=0,s=0,c=0,cs=0;
        daysWithBattery.forEach(day=>{const st=dayStats(day.stops);d+=st.dist;dr+=st.drv;s+=st.stay;c+=st.chrg;cs+=st.cs;});
        return {d,dr,s,c,cs};
      },[daysWithBattery]);

      return (
        <div className={`min-h-screen ${editMode ? "bg-[#0d0d1a]" : ""}`} style={editMode ? {boxShadow:"inset 0 0 200px rgba(59,130,246,0.03)"} : {}}>
          {editMode && (
            <div className="fixed top-0 left-0 right-0 z-40 bg-gradient-to-r from-blue-600 via-blue-500 to-blue-600 flex items-center justify-center py-1.5 shadow-lg">
              <span className="text-[11px] font-bold text-white tracking-widest uppercase">✏️ Edit Mode</span>
            </div>
          )}
          {/* Hero */}
          <header className="relative overflow-hidden border-b border-[#1a1a1a]">
            <div className="absolute inset-0 bg-gradient-to-br from-blue-900/20 via-teal-900/10 to-purple-900/20" />
            <div className="relative max-w-4xl mx-auto px-4 py-10">
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-2">
                  <span className="text-3xl">⚡</span>
                  <span className="text-[11px] font-bold uppercase tracking-widest text-gray-500">Tesla Trip Planner</span>
                </div>
                <div className="flex items-center gap-1.5">
                  <button onClick={onShareURL}
                    className="flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-[#1a1a1a] border border-[#2a2a2a] hover:border-blue-500/40 text-[11px] text-gray-400 hover:text-blue-400 transition-all">
                    🔗 Share
                  </button>
                  <button onClick={onExportJSON}
                    className="flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-[#1a1a1a] border border-[#2a2a2a] hover:border-green-500/40 text-[11px] text-gray-400 hover:text-green-400 transition-all">
                    📥 Export
                  </button>
                  <button onClick={()=>fileInputRef.current?.click()}
                    className="flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-[#1a1a1a] border border-[#2a2a2a] hover:border-purple-500/40 text-[11px] text-gray-400 hover:text-purple-400 transition-all">
                    📤 Import
                  </button>
                  <input ref={fileInputRef} type="file" accept=".json" onChange={onImportJSON} className="hidden" />
                  <div className="relative">
                    <button onClick={()=>setShowResetConfirm(!showResetConfirm)}
                      className="flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-[#1a1a1a] border border-[#2a2a2a] hover:border-red-500/40 text-[11px] text-gray-400 hover:text-red-400 transition-all">
                      ↺ Reset
                    </button>
                    {showResetConfirm && (
                      <div className="absolute top-full right-0 mt-1 bg-[#1a1a1a] border border-[#2a2a2a] rounded-lg shadow-xl p-3 z-50 w-48">
                        <p className="text-[10px] text-gray-400 mb-2">Reset all data to defaults? This cannot be undone.</p>
                        <div className="flex gap-1.5">
                          <button onClick={onResetToDefaults}
                            className="flex-1 px-2 py-1.5 rounded bg-red-500 hover:bg-red-400 text-white text-[10px] font-bold transition-colors">
                            Confirm
                          </button>
                          <button onClick={()=>setShowResetConfirm(false)}
                            className="flex-1 px-2 py-1.5 rounded bg-[#2a2a2a] hover:bg-[#3a3a3a] text-gray-300 text-[10px] font-medium transition-colors">
                            Cancel
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
              {shareMsg && (
                <div className="mb-2"><span className="text-[11px] text-green-400 font-medium animate-pulse">{shareMsg}</span></div>
              )}
              {editMode ? (
                <div className="mb-2 space-y-1">
                  <input value={heroTitle} onChange={e=>setHeroTitle(e.target.value)}
                    className="w-full bg-black/30 border border-white/10 rounded px-2 py-1.5 text-4xl md:text-5xl font-extrabold text-white focus:outline-none focus:border-blue-500/50" placeholder="Title line 1" />
                  <input value={heroSubtitle} onChange={e=>setHeroSubtitle(e.target.value)}
                    className="w-full bg-black/30 border border-white/10 rounded px-2 py-1.5 text-4xl md:text-5xl font-extrabold text-white focus:outline-none focus:border-blue-500/50" placeholder="Title line 2" />
                </div>
              ) : (
                <h1 className="text-4xl md:text-5xl font-extrabold mb-2">
                  <span className="gradient-text">{heroTitle}</span><br/>
                  <span className="text-white">{heroSubtitle}</span>
                </h1>
              )}
              {days.length > 0 && (
                <p className="text-sm text-gray-500 mb-2">
                  📅 {days[0].date}{days.length > 1 ? ` — ${days[days.length - 1].date}` : ""}
                </p>
              )}
              {editMode ? (
                <input value={heroSnippet} onChange={e=>setHeroSnippet(e.target.value)}
                  className="w-full bg-black/30 border border-white/10 rounded px-2 py-1 text-base text-gray-400 mb-5 max-w-xl focus:outline-none focus:border-blue-500/50" placeholder="Route snippet" />
              ) : (
                <p className="text-gray-400 text-base mb-5 max-w-xl">{heroSnippet}</p>
              )}
              <div className="flex items-center gap-2 text-[11px] text-gray-500 mb-5 flex-wrap">
                {[`🚗 ${VEHICLE_INFO.model}`,`🔋 ${VEHICLE_INFO.battery}`,`📏 ~${VEHICLE_INFO.rangeReal}km real range`].map(t=>(
                  <span key={t} className="px-2 py-1 rounded bg-[#1a1a1a] border border-[#2a2a2a]">{t}</span>
                ))}
              </div>
              <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                {[[totals.d.toLocaleString(),"Total km","white"],[fmt(totals.dr),"Driving","white"],[fmt(totals.s),"Activities","#60a5fa"],[String(totals.cs),"Charge stops","#4ade80"],[String(days.length),"Days","#c084fc"]].map(([v,l,c])=>(
                  <div key={l} className="bg-[#141414] rounded-xl p-3.5 border border-[#2a2a2a]">
                    <div className="text-xl font-bold" style={{color:c}}>{v}</div>
                    <div className="text-[11px] text-gray-500">{l}</div>
                  </div>
                ))}
              </div>
            </div>
          </header>

          {/* Days */}
          <div className="max-w-4xl mx-auto px-4 py-4">
            {daysWithBattery.map((d,i)=>(
              <React.Fragment key={d.day}>
                {dragDayNum && (
                  <div className="mb-3"
                    onDragOver={e => { e.preventDefault(); setHoverDayIdx(i); }}
                    onDragLeave={()=>setHoverDayIdx(null)}
                    onDrop={e => { e.preventDefault(); const from = +e.dataTransfer.getData("daynum"); if (from) { onReorderDay(from, d.day); setDragDayNum(null); setHoverDayIdx(null); }}}>
                    <div className={`w-full py-3 rounded-xl border-2 border-dashed transition-all flex items-center justify-center text-[11px] font-medium ${
                      hoverDayIdx === i ? "border-blue-500 bg-blue-500/10 text-blue-400" : "border-[#2a2a2a] text-gray-600"
                    }`}>
                      {hoverDayIdx === i && dragDayNum ? `Move Day ${dragDayNum} here` : "Drop day here"}
                    </div>
                  </div>
                )}
                <div className={dragDayNum === d.day ? "opacity-30" : ""}>
                  <DaySection day={d} onChange={onChange} startH={startTimes[i]?.h??8} startM={startTimes[i]?.m??0} onStartTime={(h,m)=>onStartTime(i,h,m)} homeBattery={homeBattery} onHomeBatteryChange={setHomeBattery} editMode={editMode} onDelete={onDelete} onEditField={onEditField} onAddStop={onAddStop} onEditDay={onEditDay} onDeleteDay={onDeleteDay} recalcStopIds={recalcStopIds} setRecalcStopIds={setRecalcStopIds}
                    onDayDragStart={num => { requestAnimationFrame(() => setDragDayNum(num)); }}
                    onDayDragEnd={() => { setDragDayNum(null); setHoverDayIdx(null); }} />
                </div>
              </React.Fragment>
            ))}
            {dragDayNum && (
              <div className="mb-3"
                onDragOver={e => { e.preventDefault(); setHoverDayIdx(daysWithBattery.length); }}
                onDragLeave={()=>setHoverDayIdx(null)}
                onDrop={e => { e.preventDefault(); const from = +e.dataTransfer.getData("daynum"); if (from) { onReorderDay(from, daysWithBattery[daysWithBattery.length-1].day + 1); setDragDayNum(null); setHoverDayIdx(null); }}}>
                <div className={`w-full py-3 rounded-xl border-2 border-dashed transition-all flex items-center justify-center text-[11px] font-medium ${
                  hoverDayIdx === daysWithBattery.length ? "border-blue-500 bg-blue-500/10 text-blue-400" : "border-[#2a2a2a] text-gray-600"
                }`}>
                  {hoverDayIdx === daysWithBattery.length ? `Move Day ${dragDayNum} here` : "Drop day here"}
                </div>
              </div>
            )}
            {!dragDayNum && editMode && (
              <button onClick={onAddDay}
                className="w-full py-8 rounded-2xl border-2 border-dashed border-[#2a2a2a] hover:border-blue-500/40 bg-[#141414] hover:bg-blue-500/5 text-gray-500 hover:text-blue-400 flex flex-col items-center gap-2 transition-all mb-7">
                <span className="text-3xl">+</span>
                <span className="text-sm font-medium">Add New Day</span>
              </button>
            )}
          </div>

          {/* Charging summary */}
          <div className="max-w-4xl mx-auto px-4 pb-10">
            <div className="bg-[#141414] rounded-2xl p-5 border border-[#2a2a2a] card-glow">
              <h3 className="text-base font-bold text-white mb-3">⚡ Charging Strategy Summary</h3>
              <div className="space-y-2">
                {daysWithBattery.flatMap(day => {
                  // simulate battery through the day to get arrival SOC at each charger
                  let b = day.startBattery;
                  return day.stops.map(s => {
                    b -= s.batt;
                    const arr = b;
                    if (s.type==="charge" && s.charge) {
                      const dep = calcChargedSOC(arr, s.charge.kw, s.stay);
                      b = dep;
                      return (
                        <div key={s.id} className="flex items-center justify-between bg-[#0a0a0a] rounded-lg p-2.5 border border-green-500/10">
                          <div className="flex items-center gap-2.5">
                            <span className="text-[10px] font-bold px-2 py-0.5 rounded-full" style={{background:day.color,color:"#000"}}>D{day.day}</span>
                            <div>
                              <div className="text-sm font-medium text-white">{s.name}</div>
                              <div className="text-[10px] text-gray-500">{s.address} · {s.charge.kw}kW</div>
                            </div>
                          </div>
                          <div className="text-right">
                            <div className="text-sm font-semibold text-green-400">{fmt(s.stay)}</div>
                            <div className="text-[10px] text-gray-500">{Math.round(arr)}% → {Math.round(dep)}% (+{Math.round(dep-arr)}%)</div>
                          </div>
                        </div>
                      );
                    }
                    return null;
                  }).filter(Boolean);
                })}
              </div>
              <div className="mt-3 p-2.5 rounded-lg bg-yellow-500/5 border border-yellow-500/10">
                <p className="text-[11px] text-yellow-500/80">⚠️ <strong>Important:</strong> The Model 3 base has ~400km real range (highway) / ~330km (winding GOR). Always stay above 20%. The Warrnambool → Mt Gambier leg (270km) is the longest stretch without a Supercharger — charge to 100%.</p>
              </div>
              <div className="mt-2 p-2.5 rounded-lg bg-blue-500/5 border border-blue-500/10">
                <p className="text-[11px] text-blue-400/80">💡 <strong>LFP Battery Tip:</strong> The Model 3 base uses LFP chemistry. Tesla recommends charging to 100% regularly — safe and helps calibration.</p>
              </div>
            </div>
          </div>

          <footer className="border-t border-[#1a1a1a] py-5 text-center">
            <p className="text-[11px] text-gray-600">Tesla Great Ocean Road Trip Planner · Distances & times are estimates · Verify Supercharger availability via Tesla app</p>
          </footer>

          {/* Floating buttons */}
          <div className="fixed bottom-6 right-6 flex flex-col items-center gap-3 z-30">
            {editMode && canUndo && (
              <div className="relative group">
                <button onClick={() => { if (editHistory.current.length > 0) { historyIdx.current = 0; applySnapshot(editHistory.current[0]); setCanUndo(false); setCanRedo(false); setEditMode(false); }}}
                  className="w-14 h-14 rounded-full shadow-xl flex items-center justify-center text-xl bg-red-500 hover:bg-red-400 text-white transition-all">✕</button>
                <div className="absolute right-full mr-3 top-1/2 -translate-y-1/2 px-2.5 py-1 rounded-lg bg-[#1a1a1a] border border-[#2a2a2a] text-[10px] text-gray-300 whitespace-nowrap opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity shadow-lg">
                  Discard all changes
                </div>
              </div>
            )}
            {editMode && canRedo && (
              <div className="relative group">
                <button onClick={onRedo}
                  className="w-14 h-14 rounded-full shadow-xl flex items-center justify-center text-xl bg-[#1a1a1a] hover:bg-[#2a2a2a] text-blue-400 hover:text-blue-300 border border-blue-500/30 hover:border-blue-400/50 transition-all">↻</button>
                <div className="absolute right-full mr-3 top-1/2 -translate-y-1/2 px-2.5 py-1 rounded-lg bg-[#1a1a1a] border border-[#2a2a2a] text-[10px] text-gray-300 whitespace-nowrap opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity shadow-lg">
                  Redo change
                </div>
              </div>
            )}
            {editMode && canUndo && (
              <div className="relative group">
                <button onClick={onUndo}
                  className="w-14 h-14 rounded-full shadow-xl flex items-center justify-center text-xl bg-red-500/20 hover:bg-red-500/30 text-red-400 hover:text-red-300 border border-red-500/30 hover:border-red-400/50 transition-all">↺</button>
                <div className="absolute right-full mr-3 top-1/2 -translate-y-1/2 px-2.5 py-1 rounded-lg bg-[#1a1a1a] border border-[#2a2a2a] text-[10px] text-gray-300 whitespace-nowrap opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity shadow-lg">
                  Undo last change
                </div>
              </div>
            )}
            <div className="relative group">
              <button onClick={toggleEditMode}
                className={`w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-xl transition-all ${
                  editMode ? "bg-blue-500 hover:bg-blue-400 text-white" : "bg-[#1a1a1a] hover:bg-[#2a2a2a] text-gray-300 border border-[#2a2a2a]"
                }`}>
                {editMode ? "✓" : "✏️"}
              </button>
              <div className="absolute right-full mr-3 top-1/2 -translate-y-1/2 px-2.5 py-1 rounded-lg bg-[#1a1a1a] border border-[#2a2a2a] text-[10px] text-gray-300 whitespace-nowrap opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity shadow-lg">
                {editMode ? "Done editing" : "Edit trip"}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
