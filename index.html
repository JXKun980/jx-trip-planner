                    <div className="absolute top-full right-0 mt-1 bg-[#1a1a1a] border border-[#2a2a2a] rounded-lg shadow-xl z-50 w-52 overflow-hidden">
                      <button onClick={()=>{ onExportJSON(); setMenuOpen(false); }}
                        className="w-full px-3 py-2 text-left text-[11px] text-gray-300 hover:bg-[#2a2a2a] hover:text-white transition-colors flex items-center gap-2">
                        📥 Export JSON
                      </button>
                      <button onClick={()=>{ fileInputRef.current?.click(); setMenuOpen(false); }}
                        className="w-full px-3 py-2 text-left text-[11px] text-gray-300 hover:bg-[#2a2a2a] hover:text-white transition-colors flex items-center gap-2 border-t border-[#222]">
                        📤 Import JSON
                      </button>
                      <button onClick={onShowHistory}
                        className="w-full px-3 py-2 text-left text-[11px] text-gray-300 hover:bg-[#2a2a2a] hover:text-white transition-colors flex items-center gap-2 border-t border-[#222]">
                        🕰️ Restore from History {showHistory ? "▲" : "▼"}
                      </button>
                      {showHistory && (
                        <div className="border-t border-[#222] bg-[#111]">
                          {historyItems.filter(Boolean).length === 0 ? (
                            <div className="px-3 py-2 text-[10px] text-gray-500">No history versions saved yet.</div>
                          ) : (
                            historyItems.map((h, i) => h && (
                              <div key={h.id} className="border-t border-[#1a1a1a]">
                                <button onClick={()=>setRestoreConfirmId(restoreConfirmId === h.id ? null : h.id)}
                                  className="w-full px-4 py-2 text-left text-[10px] text-gray-400 hover:bg-[#2a2a2a] hover:text-white transition-colors flex items-center gap-2">
                                  <span className="text-gray-500">#{i+1}</span>
                                  <span>{h.savedAt ? new Date(h.savedAt).toLocaleString() : "Unknown date"}</span>
                                </button>
                                {restoreConfirmId === h.id && (
                                  <div className="px-4 pt-1 pb-2.5 flex gap-1.5">
                                    <button onClick={()=>onRestoreHistory(h.id)}
                                      className="flex-1 px-2 py-1.5 rounded bg-red-500/10 hover:bg-red-500/30 text-red-400/50 hover:text-red-400 text-[10px] font-medium transition-colors">
                                      Restore
                                    </button>
                                    <button onClick={()=>setRestoreConfirmId(null)}
                                      className="flex-1 px-2 py-1.5 rounded bg-blue-500 hover:bg-blue-400 text-white text-[10px] font-bold transition-colors">
                                      Cancel
                                    </button>
                                  </div>
                                )}
                              </div>
                            ))
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>
                <input ref={fileInputRef} type="file" accept=".json" onChange={onImportJSON} className="hidden" />
              </div>
            </div>
          </nav>
          <div className="h-11" />

          {isOffline && (
            <div className="fixed left-0 right-0 z-50 bg-gradient-to-r from-gray-600 via-gray-500 to-gray-600 flex items-center justify-center py-1.5 shadow-lg" style={{top:"44px"}}>
              <svg className="w-4 h-4 mr-1.5 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728" /><path strokeLinecap="round" strokeLinejoin="round" d="M3 3l18 18" /></svg>
              <span className="text-[11px] font-bold text-white tracking-widest uppercase">Offline — Changes saved locally</span>
            </div>
          )}
          {editMode && (
            <div className="fixed left-0 right-0 z-40 bg-gradient-to-r from-blue-600 via-blue-500 to-blue-600 flex items-center justify-center py-1.5 shadow-lg" style={{top: isOffline ? "72px" : "44px"}}>
              <span className="text-[11px] font-bold text-white tracking-widest uppercase">✏️ Edit Mode</span>
            </div>
          )}
          {/* Hero */}
          <header className="relative overflow-hidden border-b border-[#1a1a1a]">
            <div className="absolute inset-0 bg-gradient-to-br from-blue-900/20 via-teal-900/10 to-purple-900/20" />
            <div className="relative max-w-4xl mx-auto px-4 py-10">
              {editMode ? (
                <div className="mb-2 space-y-1">
                  <input value={heroTitle} onChange={e=>setHeroTitle(e.target.value)}
                    className="w-full bg-black/30 border border-white/10 rounded px-2 py-1.5 text-4xl md:text-5xl font-extrabold text-white focus:outline-none focus:border-blue-500/50" placeholder="Title line 1" />
                  <input value={heroSubtitle} onChange={e=>setHeroSubtitle(e.target.value)}
                    className="w-full bg-black/30 border border-white/10 rounded px-2 py-1.5 text-4xl md:text-5xl font-extrabold text-white focus:outline-none focus:border-blue-500/50" placeholder="Title line 2" />
                </div>
              ) : (
                <h1 className="text-4xl md:text-5xl font-extrabold mb-2">
                  <span className="gradient-text">{heroTitle}</span><br/>
                  <span className="text-white">{heroSubtitle}</span>
                </h1>
              )}
              {days.length > 0 && (
                <p className="text-sm text-gray-500 mb-2">
                  📅 {days[0].date}{days.length > 1 ? ` — ${days[days.length - 1].date}` : ""}
                </p>
              )}
              {editMode ? (
                <input value={heroSnippet} onChange={e=>setHeroSnippet(e.target.value)}
                  className="w-full bg-black/30 border border-white/10 rounded px-2 py-1 text-base text-gray-400 mb-5 max-w-xl focus:outline-none focus:border-blue-500/50" placeholder="Route snippet" />
              ) : (
                <p className="text-gray-400 text-base mb-5 max-w-xl">{heroSnippet}</p>
              )}
              <div className="flex items-center gap-2 text-[11px] text-gray-500 mb-5 flex-wrap">
                {[`🚗 ${VEHICLE_INFO.model}`,`🔋 ${VEHICLE_INFO.battery}`,`📏 ~${VEHICLE_INFO.rangeReal}km real range`].map(t=>(
                  <span key={t} className="px-2 py-1 rounded bg-[#1a1a1a] border border-[#2a2a2a]">{t}</span>
                ))}
              </div>
              <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                {[[totals.d.toLocaleString(),"Total km","white"],[fmt(totals.dr),"Driving","white"],[fmt(totals.s),"Activities","#60a5fa"],[String(totals.cs),"Charge stops","#4ade80"],[String(days.length),"Days","#c084fc"]].map(([v,l,c])=>(
                  <div key={l} className="bg-[#141414] rounded-xl p-3.5 border border-[#2a2a2a]">
                    <div className="text-xl font-bold" style={{color:c}}>{v}</div>
                    <div className="text-[11px] text-gray-500">{l}</div>
                  </div>
                ))}
              </div>
            </div>
          </header>

          {/* Sticky Route Map + Day Selector */}
          {daysWithBattery.length > 0 && (
            <div className="sticky-map bg-[#0a0a0a]">
              <StickyRouteMap days={daysWithBattery} activeDayIdx={activeMapDay} startTimes={startTimes} activeStopId={activeStopId} />
              {/* Active day stats */}
              {daysWithBattery[activeMapDay] && (() => {
                const ad = daysWithBattery[activeMapDay];
                const adSt = dayStats(ad.stops);
                const adSH = startTimes[activeMapDay]?.h ?? 8;
                const adSM = startTimes[activeMapDay]?.m ?? 0;
                const adEnd = timeOfDay(adSH, adSM + ad.stops.reduce((a,s) => a + (s.drive||0) + (s.stay||0), 0));
                return (
                  <div className="max-w-4xl mx-auto px-4">
                    <div className="flex items-center gap-3 text-[10px] py-1.5 flex-wrap">
                      <span className="text-gray-500">📅 {ad.date}</span>
                      <span className="text-gray-700">·</span>
                      <span className="text-gray-500">🕐 {timeOfDay(adSH, adSM)} → {adEnd}</span>
                      <span className="text-gray-700">·</span>
                      <span className="text-gray-500">📍 {ad.stops.length} stops</span>
                      <span className="text-gray-700">·</span>
                      <span className="text-gray-500">🚗 {adSt.dist} km</span>
                      <span className="text-gray-700">·</span>
                      <span className="text-gray-500">⏱ {fmt(adSt.drv)}</span>
                      {adSt.cs > 0 && <><span className="text-gray-700">·</span><span className="text-green-500/70">⚡ {adSt.cs} charges</span></>}
                    </div>
                  </div>
                );
              })()}
              {/* Day selector */}
              <div className="max-w-4xl mx-auto px-4 pt-1 pb-1">
                <div className="flex items-center gap-1.5 overflow-x-auto">
                  {daysWithBattery.map((d, i) => (
                    <button key={d.day} onClick={() => {
                      setActiveMapDay(i);
                      const ref = dayRefs.current[i];
                      if (ref) ref.scrollIntoView({ behavior: "smooth", block: "start" });
                    }}
                      className={`shrink-0 flex items-center gap-1.5 px-3 py-2 rounded-lg text-[11px] font-medium transition-all ${
                        i === activeMapDay
                          ? "text-white"
                          : "text-gray-500 hover:text-gray-300 hover:bg-white/5"
                      }`}
                      style={i === activeMapDay ? {background: d.color + "22", border: `1px solid ${d.color}44`} : {border:"1px solid transparent"}}>
                      <span className="text-[9px] font-bold px-1.5 py-0.5 rounded-full" style={{background: d.color, color: "#000"}}>D{d.day}</span>
                      <span className="truncate max-w-[140px]">{d.title}</span>
                    </button>
                  ))}
                </div>
              </div>
              <div className="max-w-4xl mx-auto px-4"><div className="border-t border-[#1a1a1a]" /></div>
            </div>
          )}

          {/* Days */}
          <div className="max-w-4xl mx-auto px-4 py-2">
            {daysWithBattery.map((d,i)=>(
              <React.Fragment key={d.day}>
                {dragDayNum && (
                  <div className="mb-3"
                    onDragOver={e => { e.preventDefault(); setHoverDayIdx(i); }}
                    onDragLeave={()=>setHoverDayIdx(null)}
                    onDrop={e => { e.preventDefault(); const from = +e.dataTransfer.getData("daynum"); if (from) { onReorderDay(from, d.day); setDragDayNum(null); setHoverDayIdx(null); }}}>
                    <div className={`w-full py-3 rounded-xl border-2 border-dashed transition-all flex items-center justify-center text-[11px] font-medium ${
                      hoverDayIdx === i ? "border-blue-500 bg-blue-500/10 text-blue-400" : "border-[#2a2a2a] text-gray-600"
                    }`}>
                      {hoverDayIdx === i && dragDayNum ? `Move Day ${dragDayNum} here` : "Drop day here"}
                    </div>
                  </div>
                )}
                <div ref={el => dayRefs.current[i] = el} className={dragDayNum === d.day ? "opacity-30" : ""}>
                  <DaySection day={d} onChange={onChange} startH={startTimes[i]?.h??8} startM={startTimes[i]?.m??0} onStartTime={(h,m)=>onStartTime(i,h,m)} homeBattery={homeBattery} onHomeBatteryChange={setHomeBattery} editMode={editMode} onDelete={onDelete} onEditField={onEditField} onAddStop={onAddStop} onEditDay={onEditDay} onDeleteDay={onDeleteDay} recalcStopIds={recalcStopIds} setRecalcStopIds={setRecalcStopIds}
                    onStopClick={setActiveStopId}
                    onDayDragStart={num => { requestAnimationFrame(() => setDragDayNum(num)); }}
                    onDayDragEnd={() => { setDragDayNum(null); setHoverDayIdx(null); }} />
                </div>
              </React.Fragment>
            ))}
            {dragDayNum && (
              <div className="mb-3"
                onDragOver={e => { e.preventDefault(); setHoverDayIdx(daysWithBattery.length); }}
                onDragLeave={()=>setHoverDayIdx(null)}
                onDrop={e => { e.preventDefault(); const from = +e.dataTransfer.getData("daynum"); if (from) { onReorderDay(from, daysWithBattery[daysWithBattery.length-1].day + 1); setDragDayNum(null); setHoverDayIdx(null); }}}>
                <div className={`w-full py-3 rounded-xl border-2 border-dashed transition-all flex items-center justify-center text-[11px] font-medium ${
                  hoverDayIdx === daysWithBattery.length ? "border-blue-500 bg-blue-500/10 text-blue-400" : "border-[#2a2a2a] text-gray-600"
                }`}>
                  {hoverDayIdx === daysWithBattery.length ? `Move Day ${dragDayNum} here` : "Drop day here"}
                </div>
              </div>
            )}
            {!dragDayNum && editMode && (
              <button onClick={onAddDay}
                className="w-full py-8 rounded-2xl border-2 border-dashed border-[#2a2a2a] hover:border-blue-500/40 bg-[#141414] hover:bg-blue-500/5 text-gray-500 hover:text-blue-400 flex flex-col items-center gap-2 transition-all mb-7">
                <span className="text-3xl">+</span>
                <span className="text-sm font-medium">Add New Day</span>
              </button>
            )}
          </div>

          {/* Charging summary */}
          <div className="max-w-4xl mx-auto px-4 pb-10">
            <div className="bg-[#141414] rounded-2xl p-5 border border-[#2a2a2a] card-glow">
              <h3 className="text-base font-bold text-white mb-3">⚡ Charging Strategy Summary</h3>
              <div className="space-y-2">
                {daysWithBattery.flatMap(day => {
                  let b = clampPct(day.startBattery);
                  return day.stops.map((s, i) => {
                    const mode = s.travelMode || "drive";
                    if (mode === "drive") {
                      const evStart = (i > 0 && s.evLinked === false) ? clampPct(s.evStartBattery ?? 100) : b;
                      b = clampPct(evStart - (Number(s.batt) || 0));
                    }
                    const arr = b;
                    if (s.type==="charge" && s.charge) {
                      const dep = clampPct(calcChargedSOC(arr, s.charge.kw, s.stay));
                      b = dep;
                      return (
                        <div key={s.id} className="flex items-center justify-between bg-[#0a0a0a] rounded-lg p-2.5 border border-green-500/10">
                          <div className="flex items-center gap-2.5">
                            <span className="text-[10px] font-bold px-2 py-0.5 rounded-full" style={{background:day.color,color:"#000"}}>D{day.day}</span>
                            <div>
                              <div className="text-sm font-medium text-white">{s.name}</div>
                              <div className="text-[10px] text-gray-500">{s.address} · {s.charge.kw}kW</div>
                            </div>
                          </div>
                          <div className="text-right">
                            <div className="text-sm font-semibold text-green-400">{fmt(s.stay)}</div>
                            <div className="text-[10px] text-gray-500">{Math.round(arr)}% → {Math.round(dep)}% (+{Math.round(dep-arr)}%)</div>
                          </div>
                        </div>
                      );
                    }
                    return null;
                  }).filter(Boolean);
                })}
              </div>
              <div className="mt-3 p-2.5 rounded-lg bg-yellow-500/5 border border-yellow-500/10">
                <p className="text-[11px] text-yellow-500/80">⚠️ <strong>Important:</strong> The Model 3 base has ~400km real range (highway) / ~330km (winding GOR). Always stay above 20%. The Warrnambool → Mt Gambier leg (270km) is the longest stretch without a Supercharger — charge to 100%.</p>
              </div>
              <div className="mt-2 p-2.5 rounded-lg bg-blue-500/5 border border-blue-500/10">
                <p className="text-[11px] text-blue-400/80">💡 <strong>LFP Battery Tip:</strong> The Model 3 base uses LFP chemistry. Tesla recommends charging to 100% regularly — safe and helps calibration.</p>
              </div>
            </div>
          </div>

          <footer className="border-t border-[#1a1a1a] py-5 text-center">
            <p className="text-[11px] text-gray-600">JX Travel Planner · Distances & times are estimates · Verify charger availability before departure</p>
          </footer>

          {/* Floating buttons */}
          <div className="fixed bottom-6 right-6 flex flex-col items-center gap-3 z-30">
            {editMode && canUndo && (
              <div className="relative group">
                <button onClick={() => { if (editHistory.current.length > 0) { historyIdx.current = 0; applySnapshot(editHistory.current[0]); setCanUndo(false); setCanRedo(false); setEditMode(false); }}}
                  className="w-14 h-14 rounded-full shadow-xl flex items-center justify-center text-xl bg-red-500 hover:bg-red-400 text-white transition-all">✕</button>
                <div className="absolute right-full mr-3 top-1/2 -translate-y-1/2 px-2.5 py-1 rounded-lg bg-[#1a1a1a] border border-[#2a2a2a] text-[10px] text-gray-300 whitespace-nowrap opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity shadow-lg">
                  Discard all changes
                </div>
              </div>
            )}
            {editMode && canRedo && (
              <div className="relative group">
                <button onClick={onRedo}
                  className="w-14 h-14 rounded-full shadow-xl flex items-center justify-center text-xl bg-[#1a1a1a] hover:bg-[#2a2a2a] text-blue-400 hover:text-blue-300 border border-blue-500/30 hover:border-blue-400/50 transition-all">↻</button>
                <div className="absolute right-full mr-3 top-1/2 -translate-y-1/2 px-2.5 py-1 rounded-lg bg-[#1a1a1a] border border-[#2a2a2a] text-[10px] text-gray-300 whitespace-nowrap opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity shadow-lg">
                  Redo change
                </div>
              </div>
            )}
            {editMode && canUndo && (
              <div className="relative group">
                <button onClick={onUndo}
                  className="w-14 h-14 rounded-full shadow-xl flex items-center justify-center text-xl bg-red-500/20 hover:bg-red-500/30 text-red-400 hover:text-red-300 border border-red-500/30 hover:border-red-400/50 transition-all">↺</button>
                <div className="absolute right-full mr-3 top-1/2 -translate-y-1/2 px-2.5 py-1 rounded-lg bg-[#1a1a1a] border border-[#2a2a2a] text-[10px] text-gray-300 whitespace-nowrap opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity shadow-lg">
                  Undo last change
                </div>
              </div>
            )}
            <div className="relative group">
              <button onClick={toggleEditMode}
                className={`w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-xl transition-all ${
                  editMode ? "bg-blue-500 hover:bg-blue-400 text-white" : "bg-[#1a1a1a] hover:bg-[#2a2a2a] text-gray-300 border border-[#2a2a2a]"
                }`}>
                {editMode ? "✓" : "✏️"}
              </button>
              <div className="absolute right-full mr-3 top-1/2 -translate-y-1/2 px-2.5 py-1 rounded-lg bg-[#1a1a1a] border border-[#2a2a2a] text-[10px] text-gray-300 whitespace-nowrap opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity shadow-lg">
                {editMode ? "Done editing" : "Edit trip"}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
  </script>
</body>
</html>
