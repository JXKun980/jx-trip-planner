    // Tesla Model 3 LFP charging curve (conservative kW at each SOC band)
    // The car limits intake regardless of charger max — these are car-side limits.
    // Charger kW caps the rate if lower than the car curve.
    const CHARGE_CURVE = [
      // [socMin, socMax, carMaxKW]  — conservative real-world values
      [0,   10,  120],
      [10,  20,  145],
      [20,  30,  150],  // LFP peaks around 20-40%
      [30,  40,  140],
      [40,  50,  120],
      [50,  60,   85],

    // Simulate charging: given arrival SOC%, charger max kW, and minutes → departure SOC%
    function calcChargedSOC(arrivalPct, chargerKW, minutes) {
      let soc = arrivalPct; // current SOC in %
      const stepMin = 0.5;  // simulate in 30-second steps for accuracy
      let remaining = minutes;

      while (remaining > 0 && soc < 100) {
        const step = Math.min(stepMin, remaining);
        // find the car's charge rate at current SOC
        let carRate = 6; // fallback for >95%
        for (const [lo, hi, kw] of CHARGE_CURVE) {
          if (soc >= lo && soc < hi) { carRate = kw; break; }
        }
        // effective rate = min(car curve, charger max output)
        const effectiveKW = Math.min(carRate, chargerKW);
        // energy added in this time step (kWh)
        const energyAdded = effectiveKW * (step / 60);
        // convert to SOC %
        const socAdded = (energyAdded / BATTERY_KWH) * 100;
        soc = Math.min(100, soc + socAdded);
        remaining -= step;
      }
      return Math.round(soc * 10) / 10; // round to 1 decimal
    }

    function timeOfDay(h, addM) { const t=h*60+addM, hr=Math.floor(t/60)%24, mn=t%60, ap=hr>=12?"PM":"AM", h12=hr===0?12:hr>12?hr-12:hr; return `${h12}:${String(mn).padStart(2,'0')} ${ap}`; }
    function mapEmbed(stop) {
      // Use POI name for chargers to find the actual Tesla Supercharger business listing
      const q = stop.poi || (stop.mq ? stop.mq.replace(/\+/g, " ") : `${stop.lat},${stop.lng}`);
      return `https://maps.google.com/maps?q=${encodeURIComponent(q)}&z=16&output=embed`;
    }

    function dayStats(stops) {
      let dist=0, drv=0, stay=0, chrg=0, cs=0;
      stops.forEach(s => { dist+=s.dist; drv+=s.drive; stay+=s.stay; if(s.type==="charge"){chrg+=s.stay;cs++;} });
      return {dist,drv,stay,chrg,cs};
    }

    // ── Charger Status (Open Charge Map API with fallback to local data) ──
    const OCM_API = "https://api.openchargemap.org/v3/poi/";

    async function fetchChargerStatus(lat, lng) {
      try {
        // Search wider radius, no operator filter, to maximize chance of finding the station
        const url = `${OCM_API}?output=json&latitude=${lat}&longitude=${lng}&distance=5&distanceunit=KM&maxresults=5&compact=true&verbose=false`;
        const res = await fetch(url);
        if (!res.ok) return null;
        const data = await res.json();
        if (!data || data.length === 0) return null;
        // Try to find a Tesla station first, otherwise take the closest
        const tesla = data.find(s => {
          const op = s.OperatorInfo?.Title || s.AddressInfo?.Title || "";
          return op.toLowerCase().includes("tesla");
        });
        const site = tesla || data[0];
        const conns = site.Connections || [];
        const totalPoints = conns.reduce((s, c) => s + (c.Quantity || 1), 0);
        const status = site.StatusType?.Title || "Unknown";
        const verified = site.DateLastVerified || site.DateLastStatusUpdate;
        const addr = site.AddressInfo;
        const opName = site.OperatorInfo?.Title || "";
        return {
          title: addr?.Title || "Charging Station",
          status,
          totalPoints,
          isTesla: opName.toLowerCase().includes("tesla"),
          operator: opName,
          connections: conns.map(c => ({
            type: c.ConnectionType?.Title || "Unknown",
            kw: c.PowerKW || 0,
            qty: c.Quantity || 1,
            status: c.StatusType?.Title || status,
          })),
          lastVerified: verified ? new Date(verified).toLocaleDateString() : null,
        };
      } catch { return null; }
    }

      const [ocmFailed, setOcmFailed] = useState(false);

      const doFetch = async () => {
        setLoading(true);
        const result = await fetchChargerStatus(lat, lng);
        setOcmData(result);
        setOcmFailed(!result);
        setFetchedAt(new Date());
        setLoading(false);
      };

      React.useEffect(() => { doFetch(); }, []);

      // Merge: prefer OCM live data, fall back to our hardcoded chargeInfo
      const hasOcm = ocmData && ocmData.isTesla;
      const status = hasOcm ? ocmData.status : "Operational";
      const totalPoints = hasOcm ? ocmData.totalPoints : chargeInfo.stalls;
      const connections = hasOcm && ocmData.connections.length > 0
        ? ocmData.connections
        : [{ type: "CCS2 / Tesla", kw: chargeInfo.kw, qty: chargeInfo.stalls, status: "Operational" }];
      const source = hasOcm ? "Open Charge Map" : "Local data";

    function AddStopButton({ onClick }) {

    // Haversine distance in km
    function haversine(lat1, lng1, lat2, lng2) {
      const R = 6371, toR = Math.PI / 180;
      const dLat = (lat2 - lat1) * toR, dLng = (lng2 - lng1) * toR;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toR) * Math.cos(lat2*toR) * Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // Speed-based battery consumption for Tesla Model 3 Base (LFP 60kWh)
    // Returns kWh/100km based on average speed
    function consumptionAtSpeed(avgKmh) {
      if (avgKmh <= 40) return 12;   // city crawl
      if (avgKmh <= 60) return 13;   // suburban
      if (avgKmh <= 80) return 14.5; // outer suburban / country
      if (avgKmh <= 100) return 16;  // highway
      if (avgKmh <= 110) return 18;  // fast highway
      return 20;                      // motorway 110+
    }

    // Get real road distance + drive time via OSRM (free, no key)
    async function fetchDriveStats(fromLat, fromLng, toLat, toLng) {
      try {
        const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${fromLng},${fromLat};${toLng},${toLat}?overview=false`);
        const data = await res.json();
        if (data.code === "Ok" && data.routes && data.routes.length > 0) {
          const route = data.routes[0];
          const dist = Math.round(route.distance / 1000); // meters to km
          const drive = Math.round(route.duration / 60); // seconds to minutes
          const avgSpeed = dist / (drive / 60); // km/h
          const kwhPer100 = consumptionAtSpeed(avgSpeed);
          const energyUsed = dist * kwhPer100 / 100; // kWh
          const batt = Math.round(energyUsed / BATTERY_KWH * 100); // % of 60kWh battery
          return { dist, drive, batt, _routeSource: "osrm" };
        }
      } catch {}
      // Fallback to estimate if OSRM fails
      const straight = haversine(fromLat, fromLng, toLat, toLng);
      const roadKm = Math.round(straight * 1.35);
      return { dist: roadKm, drive: Math.round(roadKm / 80 * 60), batt: Math.round(roadKm * 0.23), _routeSource: "estimate" };
    }

    // Geocode address via Nominatim, returns {lat, lng} or null
    async function geocodeAddress(address) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`);
        const data = await res.json();
        if (data && data.length > 0) return { lat: +data[0].lat, lng: +data[0].lon };
      } catch {}
      return null;
    }

    // Photon autocomplete API (OpenStreetMap-based, free, no key)
    async function fetchSuggestions(query) {
      if (!query || query.length < 3) return [];
      try {
        const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=5&lang=en&lat=-37.8&lon=144.9`);
        const data = await res.json();
        return (data.features || []).map(f => {
          const p = f.properties || {};
          const parts = [p.name, p.street, p.housenumber, p.city || p.county, p.state, p.country].filter(Boolean);
          return {
            label: parts.join(", "),
            name: p.name || "",
            address: parts.join(", "),
            lat: f.geometry?.coordinates?.[1],
            lng: f.geometry?.coordinates?.[0],
          };
        });
      } catch { return []; }
    }

    function AddressAutocomplete({ value, onChange, onSelect, placeholder, className, prevStop, onEditField, stopId }) {
      const [suggestions, setSuggestions] = useState([]);
      const [showSugg, setShowSugg] = useState(false);
      const [loading, setLoading] = useState(false);
      const [timer, setTimer] = useState(null);
      const ref = React.useRef(null);

      const handleInput = (val) => {
        onChange(val);
        if (timer) clearTimeout(timer);
        setTimer(setTimeout(async () => {
          const s = await fetchSuggestions(val);
          setSuggestions(s);
          setShowSugg(s.length > 0);
        }, 300));
      };

      const pick = async (s) => {
        setShowSugg(false);
        setLoading(true);
        const updates = {
          address: s.address,
          name: s.name || s.address.split(",")[0],
          mq: s.address.replace(/\s+/g, "+"),
          lat: s.lat,
          lng: s.lng,
        };
        // Auto-detect charger
        if (isChargerName(s.label)) {
          updates.type = "charge"; updates.charge = makeChargeDefaults(); updates.emoji = "⚡";
          updates.poi = s.name.replace(/\s+/g, "+");
        }
        // Auto-calc drive stats via OSRM if prev stop available
        if (prevStop && prevStop.lat && s.lat) {
          const stats = await fetchDriveStats(prevStop.lat, prevStop.lng, s.lat, s.lng);
          Object.assign(updates, stats);
        }
        setLoading(false);
        onSelect(updates);
      };

      // Close dropdown on outside click
      React.useEffect(() => {
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setShowSugg(false); };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
      }, []);

      return (
        <div className="relative" ref={ref}>
          <input value={loading ? "⏳ Calculating route..." : value} onChange={e=>handleInput(e.target.value)}
            onFocus={()=>{ if (suggestions.length) setShowSugg(true); }}
            disabled={loading}
            placeholder={placeholder} className={`${className} ${loading ? "opacity-60" : ""}`} />
          {showSugg && (
            <div className="absolute z-30 top-full left-0 right-0 mt-1 bg-[#1a1a1a] border border-[#2a2a2a] rounded-lg shadow-xl max-h-48 overflow-y-auto">
              {suggestions.map((s, i) => (
                <button key={i} onClick={()=>pick(s)}
                  className="w-full text-left px-3 py-2 text-[11px] text-gray-300 hover:bg-[#2a2a2a] hover:text-white transition-colors border-b border-[#222] last:border-0 flex items-start gap-2">
                  <span className="text-gray-500 shrink-0 mt-0.5">📍</span>
                  <span className="leading-snug">{s.label}</span>
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    // Reverse geocode via Nominatim
    async function reverseGeocode(lat, lng) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
        const data = await res.json();
        return data.display_name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      } catch { return `${lat.toFixed(5)}, ${lng.toFixed(5)}`; }
    }

    function AddressEditModal({ stop, prevStop, nextStop, onSave, onCancel }) {
      const [addr, setAddr] = useState(stop.address || "");
      const [lat, setLat] = useState(stop.lat || -37.8136);
      const [lng, setLng] = useState(stop.lng || 144.9631);
      const [name, setName] = useState(stop.name || "");
      const [suggestions, setSuggestions] = useState([]);
      const [showSugg, setShowSugg] = useState(false);
      const [timer, setTimer] = useState(null);
      const mapRef = React.useRef(null);
      const mapInstanceRef = React.useRef(null);
      const markerRef = React.useRef(null);
      const inputRef = React.useRef(null);

      // Initialize Leaflet map — pin fixed to center, move map to move pin
      React.useEffect(() => {
        if (!mapRef.current || mapInstanceRef.current) return;
        const map = L.map(mapRef.current, { zoomControl: true }).setView([lat, lng], 14);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: '© OpenStreetMap',
        }).addTo(map);
        let debounceTimer = null;
        map.on("moveend", () => {
          const c = map.getCenter();
          setLat(c.lat); setLng(c.lng);
          if (debounceTimer) clearTimeout(debounceTimer);
          debounceTimer = setTimeout(async () => {
            const address = await reverseGeocode(c.lat, c.lng);
            setAddr(address);
          }, 600);
        });
        mapInstanceRef.current = map;
        setTimeout(() => map.invalidateSize(), 200);
        return () => { map.remove(); mapInstanceRef.current = null; };
      }, []);

      // Move map when lat/lng change from search
      const moveMap = (newLat, newLng) => {
        setLat(newLat); setLng(newLng);
        if (mapInstanceRef.current) mapInstanceRef.current.setView([newLat, newLng], 15);
      };

      const handleInput = (val) => {
        setAddr(val);
        if (timer) clearTimeout(timer);
        setTimer(setTimeout(async () => {
          const s = await fetchSuggestions(val);
          setSuggestions(s); setShowSugg(s.length > 0);
        }, 300));
      };

      const pickSuggestion = (s) => {
        setAddr(s.address); setName(s.name || s.address.split(",")[0]);

                <input ref={inputRef} value={addr} onChange={e=>handleInput(e.target.value)}
                  onFocus={()=>{ if (suggestions.length) setShowSugg(true); }}
                  placeholder="Search for an address or place..."
                  className="w-full bg-[#0a0a0a] border border-[#2a2a2a] rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-600 focus:border-blue-500/50 focus:outline-none" />
                {showSugg && (
                  <div className="absolute top-full left-0 right-0 mt-1 bg-[#1a1a1a] border border-[#2a2a2a] rounded-lg shadow-xl max-h-40 overflow-y-auto" style={{zIndex:2000}}>
                    {suggestions.map((s, i) => (
                      <button key={i} onClick={()=>pickSuggestion(s)}
                        className="w-full text-left px-3 py-2 text-[11px] text-gray-300 hover:bg-[#2a2a2a] hover:text-white transition-colors border-b border-[#222] last:border-0 flex items-start gap-2">
                        <span className="text-gray-500 shrink-0 mt-0.5">📍</span>
                        <span className="leading-snug">{s.label}</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
              {/* Name field */}
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Stop name"
                className="w-full bg-[#0a0a0a] border border-[#2a2a2a] rounded-lg px-3 py-1.5 text-[11px] text-gray-300 mt-2 focus:border-blue-500/50 focus:outline-none" />
            </div>
            {/* Map with fixed center pin */}

                </div>
              </div>
            </div>
            {/* Coordinates display */}

              <span>Lat: {lat.toFixed(5)}</span>
              <span>Lng: {lng.toFixed(5)}</span>
              <span className="text-gray-600 ml-auto">Move the map to change location</span>
            </div>
            {/* Footer buttons */}

    // ── Weather (Open-Meteo, free, no key) ──
    const WMO_WEATHER = {
      0:"☀️ Clear", 1:"🌤️ Mostly Clear", 2:"⛅ Partly Cloudy", 3:"☁️ Overcast",
      45:"🌫️ Fog", 48:"🌫️ Fog",
      51:"🌦️ Drizzle", 53:"🌦️ Drizzle", 55:"🌦️ Heavy Drizzle",
      61:"🌧️ Light Rain", 63:"🌧️ Rain", 65:"🌧️ Heavy Rain",
      71:"❄️ Light Snow", 73:"❄️ Snow", 75:"❄️ Heavy Snow",
      80:"🌦️ Showers", 81:"🌦️ Showers", 82:"🌧️ Heavy Showers",
      95:"⛈️ Thunderstorm", 96:"⛈️ Hail Storm", 99:"⛈️ Hail Storm",
    };
    function wmoToWeather(code) { return WMO_WEATHER[code] || "❓ Unknown"; }
    // "Worst" weather = highest code number
    function worstWeatherCode(codes) { return codes.length > 0 ? Math.max(...codes) : 0; }

    function parseDate(dateStr) {
      try {
        const cleaned = dateStr.replace(/^[A-Za-z]+,\s*/, "");
        const parsed = new Date(cleaned + " 12:00:00");
        if (!isNaN(parsed)) {
          const y = parsed.getFullYear(), m = String(parsed.getMonth()+1).padStart(2,"0"), d = String(parsed.getDate()).padStart(2,"0");
          return `${y}-${m}-${d}`;
        }
      } catch {}
      return null;
    }

    // stopsWithTimes: [{...stop, arriveHour, departHour}]
    async function fetchDayWeather(stopsWithTimes, dateStr) {
      const targetDate = parseDate(dateStr);
      const seen = {};  // key -> hourly data cache
      const results = [];

      for (const s of stopsWithTimes) {
        if (!s.lat || !s.lng) { results.push({ stopId: s.id }); continue; }
        const key = `${Math.round(s.lat*2)/2},${Math.round(s.lng*2)/2}`;
        let hourlyData = seen[key];
        if (!hourlyData) {
          try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lng}&hourly=temperature_2m,weathercode,uv_index&timezone=auto&forecast_days=14`);
            const data = await res.json();
            if (data.hourly) { hourlyData = data.hourly; seen[key] = hourlyData; }
          } catch {}
        }
        if (!hourlyData) { results.push({ stopId: s.id }); continue; }

        // Find hourly indices matching the stop's arrival-departure window on target date
        const arrH = Math.max(0, Math.min(23, Math.floor(s.arriveHour ?? 8)));
        const depH = Math.max(arrH, Math.min(23, Math.ceil(s.departHour ?? arrH + 1)));
        const matchIndices = [];
        for (let h = arrH; h <= depH; h++) {
          const timeStr = `${targetDate || hourlyData.time[0]?.slice(0,10)}T${String(h).padStart(2,"0")}:00`;
          const idx = hourlyData.time.indexOf(timeStr);
          if (idx >= 0) matchIndices.push(idx);
        }
        // Fallback: if no match, use the arrival hour on day 0
        if (matchIndices.length === 0) {
          const fallbackIdx = Math.min(arrH, (hourlyData.time?.length || 1) - 1);
          matchIndices.push(fallbackIdx);
        }

        const temps = matchIndices.map(i => hourlyData.temperature_2m[i]).filter(t => t != null);
        const codes = matchIndices.map(i => hourlyData.weathercode[i]).filter(c => c != null);
        const uvs = matchIndices.map(i => hourlyData.uv_index?.[i]).filter(u => u != null);
        const worstCode = worstWeatherCode(codes);

        results.push({
          stopId: s.id,
          high: temps.length > 0 ? Math.round(Math.max(...temps)) : null,
          low: temps.length > 0 ? Math.round(Math.min(...temps)) : null,
          uv: uvs.length > 0 ? Math.round(Math.max(...uvs)) : null,
          weatherCode: worstCode,
          weatherLabel: wmoToWeather(worstCode),
        });
      }

      // Aggregate for the day
      const valid = results.filter(r => r.weatherLabel);
      if (valid.length === 0) return { stops: results, day: null };
      const allCodes = valid.map(r => r.weatherCode);
      const dayWorst = worstWeatherCode(allCodes);
      return {
        stops: results,
        day: {
          high: Math.max(...valid.filter(r=>r.high!=null).map(r=>r.high)),

    // ── Sticky Route Map (Leaflet + LRM) ──
    function StickyRouteMap({ days, activeDayIdx, startTimes, activeStopId }) {
      const mapRef = React.useRef(null);

          attribution: '© OpenStreetMap',
        }).addTo(map);
        mapInstance.current = map;
        setTimeout(() => map.invalidateSize(), 200);
        return () => { map.remove(); mapInstance.current = null; };
      }, []);

      // Update route when active day changes
      React.useEffect(() => {
        const map = mapInstance.current;
        if (!map) return;

        // Always clear previous route first
        if (routingControl.current) {
          try { map.removeControl(routingControl.current); } catch {}
          routingControl.current = null;
        }

        const day = days[activeDayIdx];
        const stops = day?.stops?.filter(s => Number.isFinite(s.lat) && Number.isFinite(s.lng)) || [];
        if (!day || stops.length < 2 || !L?.Routing?.control) return;

        // Create waypoints
        const waypoints = stops.map(s => L.latLng(s.lat, s.lng));

        // Add routing
        markersRef.current = {};
        const control = L.Routing.control({
          waypoints,
          routeWhileDragging: false,
          draggableWaypoints: false,
          addWaypoints: false,
          lineOptions: { styles: [{ color: day.color || "#3b82f6", weight: 4, opacity: 0.8 }] },
          createMarker: (i, wp) => {
            const stop = stops[i];
            const marker = L.marker(wp.latLng, {
              icon: L.divIcon({
                className: "",
                html: `<div style="background:${day.color || "#3b82f6"};color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.4)">${stop.emoji || (i + 1)}</div>`,
                iconSize: [24, 24],
                iconAnchor: [12, 12],
              }),
            }).bindTooltip(stop.name, { direction: "top", offset: [0, -14] })
              .on("click", () => window.open(mapLink(stop), "_blank"));
            markersRef.current[stop.id] = { marker, stop, color: day.color };
            return marker;
          },
          show: false,
          fitSelectedRoutes: true,
        }).addTo(map);

        routingControl.current = control;

        // Invalidate size in case sticky changed layout
        setTimeout(() => map.invalidateSize(), 100);
      }, [activeDayIdx, days]);

      // Highlight active stop on map
      React.useEffect(() => {
        const map = mapInstance.current;
        if (!map || !activeStopId) return;

        if (!entry) return;
        const { marker, stop, color } = entry;
        map.flyTo(marker.getLatLng(), 13, { duration: 0.5 });
        marker.setIcon(L.divIcon({
          className: "",
          html: `<div style="background:#fff;color:${color || "#3b82f6"};width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:3px solid ${color || "#3b82f6"};box-shadow:0 0 12px ${color || "#3b82f6"}88">${stop.emoji || "📍"}</div>`,
          iconSize: [32, 32],
          iconAnchor: [16, 16],
        }));
        marker.openTooltip();
        // Revert after 3s
        const timer = setTimeout(() => {
          marker.setIcon(L.divIcon({
            className: "",
            html: `<div style="background:${color || "#3b82f6"};color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.4)">${stop.emoji || "📍"}</div>`,

            iconAnchor: [12, 12],

      const activeDay = days[activeDayIdx];
      const st = activeDay ? dayStats(activeDay.stops) : {};
      const sH = startTimes?.[activeDayIdx]?.h ?? 8;

    function DaySection({day, onChange, startH, startM, onStartTime, homeBattery, onHomeBatteryChange, editMode, onDelete, onEditField, onAddStop, onEditDay, onDeleteDay, onDayDragStart, onDayDragEnd, recalcStopIds, setRecalcStopIds, onStopClick}) {
      const st = dayStats(day.stops);
      const levels = useMemo(() => {
        let lastEvBatt = clampPct(day.startBattery), el=0, out=[];
        day.stops.forEach((s, i) => {
          const mode = s.travelMode || "drive";
          const isFirst = i === 0;
          let evStart = lastEvBatt;

          if (mode === "drive") {

          el += s.drive;
          const t = timeOfDay(startH, startM + el);

        });
        return out;
      }, [day, startH, startM]);
      const endT = useMemo(()=>timeOfDay(startH, startM + day.stops.reduce((s,x)=>s+x.drive+x.stay,0)), [day,startH,startM]);
      // Weather data for the day and all stops — re-fetch when locations change
      const [weatherData, setWeatherData] = useState(null);
      const [weatherLoading, setWeatherLoading] = useState(true);
      const [weatherLoadingIds, setWeatherLoadingIds] = useState(new Set());
      const stopsLocationKey = useMemo(() => day.stops.map(s => `${s.id}:${s.lat},${s.lng}`).join("|"), [day.stops]);
      const fetchWeather = async () => {
        setWeatherLoading(true);
        const allIds = new Set(day.stops.map(s => s.id));
        setWeatherLoadingIds(allIds);
        // Build stops with arrival/departure hours
        let elapsed = 0;
        const stopsWithTimes = day.stops.map(s => {
          elapsed += s.drive || 0;
          const arriveHour = startH + (startM + elapsed) / 60;
          const departHour = arriveHour + (s.stay || 0) / 60;
          elapsed += s.stay || 0;
          return { ...s, arriveHour, departHour };
        });
        const w = await fetchDayWeather(stopsWithTimes, day.date);

      React.useEffect(() => { if (day.stops.length > 0) fetchWeather(); }, [stopsLocationKey, stopsTimingKey, startH, startM]);

      // Drag state for stop reordering
      const [dragId, setDragId] = useState(null);

        const newStops = [...day.stops];
        const [moved] = newStops.splice(fromIdx, 1);

        newStops.splice(insertIdx, 0, moved);
        onEditDay(day.day, { stops: newStops });
        setDragId(null); setHoverIdx(null);
        // Collect IDs that need recalculation
        const affectedIds = new Set();
        [insertIdx, insertIdx + 1].forEach(idx => { if (idx > 0 && idx < newStops.length) affectedIds.add(newStops[idx].id); });

            {editMode ? (
              <div className="space-y-2">

                    {DAY_COLORS.map(c=>(
                      <button key={c} onClick={()=>onEditDay(day.day,{color:c})}
                        className={`w-5 h-5 rounded-full border-2 transition-all ${c===day.color?"border-white scale-110":"border-transparent opacity-60 hover:opacity-100"}`}
                        style={{background:c}} />

                </div>
                <input type="date" value={parseDate(day.date) || ""} onChange={e=>{
                  const d = new Date(e.target.value + "T12:00:00");
                  if (!isNaN(d)) onEditDay(day.day, {date: d.toLocaleDateString("en-AU", {weekday:"long", day:"numeric", month:"long", year:"numeric"})});
                }} className="bg-black/30 border border-white/10 rounded px-2 py-1 text-[11px] text-gray-300" />
                <input value={day.title} onChange={e=>onEditDay(day.day,{title:e.target.value})}
                  className="w-full bg-black/30 border border-white/10 rounded px-2 py-1.5 text-base font-bold text-white" placeholder="Day title" />
                <input value={day.subtitle} onChange={e=>onEditDay(day.day,{subtitle:e.target.value})}

                <h2 className="text-base font-bold text-white">{day.title}</h2>

            )}
          </div>
          <div className="mx-2" onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setHoverIdx(null); }}>
            {editMode && day.stops.length > 0 && (
              <div className="flex justify-center pb-2">
                <div className="flex items-center gap-1.5 bg-[#141414] border border-[#2a2a2a] rounded-lg px-3 py-1">
                  <span className="text-[9px] text-gray-500 uppercase tracking-wider font-medium">🕐 Depart</span>
                  <div className="flex items-center bg-[#0a0a0a] rounded border border-[#2a2a2a] overflow-hidden">
                    <select value={startH} onChange={e=>onStartTime(+e.target.value, null)}
                      onClick={e=>e.stopPropagation()}

                      style={{color:day.color, width:"40px"}}>

                    isLast={i === day.stops.length - 1}

                    routeLoading={recalcStopIds.has(s.id)} weatherLoading={weatherLoadingIds.has(s.id)} setRecalcStopIds={setRecalcStopIds} onStopClick={onStopClick}
                    onDragStartStop={id => requestAnimationFrame(() => setDragId(id))}
                    onDragEndStop={() => { setDragId(null); setHoverIdx(null); }} />
                </div>

              </React.Fragment>
            ))}
            {dragId && <DropIndicator idx={day.stops.length} visible={hoverIdx === day.stops.length} />}
          </div>
        </div>
      );

    // Simulate a full day and return the final battery %
    function simulateDayEndBattery(day) {
      let b = clampPct(day.startBattery);
      day.stops.forEach((s, i) => {
        const mode = s.travelMode || "drive";
        if (mode === "drive") {
          const evStart = (i > 0 && s.evLinked === false) ? clampPct(s.evStartBattery ?? 100) : b;
          b = clampPct(evStart - (Number(s.batt) || 0));
        }
        if (s.type === "charge" && s.charge) {
          b = clampPct(calcChargedSOC(b, s.charge.kw, s.stay));
        }
      });
      return b;
    }

    // ── Export/Import helpers ──

    // ── Cloud save via Cloudflare KV (Pages Functions API) ──
    // ⚠️  SETUP: In Cloudflare dashboard:
    //  1. Workers & Pages → KV → Create namespace → name it "TRIPS"
    //  2. Your Pages project → Settings → Functions → KV namespace bindings
    //     → Variable name: TRIPS, KV namespace: (select TRIPS)
    //  3. Redeploy. Cloud save will work automatically.

    async function cloudSave(data, expectedSavedAt, force, tripId) {
      const res = await fetch("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ data, expectedSavedAt, force, tripId }),
      });
      const result = await res.json();
      if (res.status === 409) return { conflict: true, cloudData: result.cloudData };
      if (!res.ok) throw new Error(result.error || "Save failed");
      return { ok: true, savedAt: result.savedAt };
    }

    // ── Three-way merge engine ──
    function mergeField(base, local, cloud) {
      const bj = JSON.stringify(base), lj = JSON.stringify(local), cj = JSON.stringify(cloud);
      if (lj === bj) return { value: cloud, src: "cloud" };    // only cloud changed (or neither)
      if (cj === bj) return { value: local, src: "local" };    // only local changed
      if (lj === cj) return { value: local, src: "both-same" }; // both changed identically
      return { value: null, conflict: true, local, cloud, base }; // real conflict
    }

    function mergeStops(baseStops, localStops, cloudStops) {
      const conflicts = [];
      const bMap = Object.fromEntries((baseStops || []).map(s => [s.id, s]));
      const lMap = Object.fromEntries((localStops || []).map(s => [s.id, s]));
      const cMap = Object.fromEntries((cloudStops || []).map(s => [s.id, s]));
      const allIds = [...new Set([...(localStops||[]).map(s=>s.id), ...(cloudStops||[]).map(s=>s.id)])];

      // Use local order as primary, append cloud-only additions
      const localIds = (localStops || []).map(s => s.id);
      const cloudOnlyNew = allIds.filter(id => !localIds.includes(id) && !bMap[id] && cMap[id]);
      const orderedIds = [...localIds, ...cloudOnlyNew];

      const merged = [];
      for (const id of orderedIds) {
        const b = bMap[id], l = lMap[id], c = cMap[id];
        // Added by one side only
        if (!b && l && !c) { merged.push(l); continue; }
        if (!b && !l && c) { merged.push(c); continue; }
        // Deleted by one side
        if (b && !l && c) {
          // Local deleted — check if cloud changed it
          if (JSON.stringify(b) === JSON.stringify(c)) continue; // both agree, delete
          merged.push(c); continue; // cloud changed it, keep cloud version
        }
        if (b && l && !c) {
          // Cloud deleted — check if local changed it
          if (JSON.stringify(b) === JSON.stringify(l)) continue; // both agree, delete
          merged.push(l); continue; // local changed it, keep local version
        }
        if (!l && !c) continue; // both deleted
        // Both exist — merge field by field
        const mergedStop = {};
        const keys = new Set([...Object.keys(b||{}), ...Object.keys(l||{}), ...Object.keys(c||{})]);
        for (const k of keys) {
          const r = mergeField(b?.[k], l?.[k], c?.[k]);
          if (r.conflict) {
            conflicts.push({ path: `stop.${id}.${k}`, local: r.local, cloud: r.cloud });
            mergedStop[k] = c?.[k]; // default to cloud
          } else { mergedStop[k] = r.value; }
        }
        merged.push(mergedStop);
      }
      return { merged, conflicts };
    }

    function mergeDays(baseDays, localDays, cloudDays) {
      const conflicts = [];
      const maxLen = Math.max(baseDays?.length||0, localDays?.length||0, cloudDays?.length||0);
      const merged = [];
      for (let i = 0; i < maxLen; i++) {
        const b = baseDays?.[i], l = localDays?.[i], c = cloudDays?.[i];
        if (!b && l && !c) { merged.push(l); continue; }
        if (!b && !l && c) { merged.push(c); continue; }
        if (b && !l && c) { if (JSON.stringify(b)===JSON.stringify(c)) continue; merged.push(c); continue; }
        if (b && l && !c) { if (JSON.stringify(b)===JSON.stringify(l)) continue; merged.push(l); continue; }
        if (!l && !c) continue;
        // Merge day fields
        const mergedDay = {};
        for (const k of ['day','date','title','subtitle','color','gradient','startBattery']) {
          const r = mergeField(b?.[k], l?.[k], c?.[k]);
          if (r.conflict) {
            conflicts.push({ path: `day${i}.${k}`, local: r.local, cloud: r.cloud });
            mergedDay[k] = c?.[k];
          } else { mergedDay[k] = r.value; }
        }
        // Merge stops
        const sr = mergeStops(b?.stops, l?.stops, c?.stops);
        mergedDay.stops = sr.merged;
        conflicts.push(...sr.conflicts.map(c => ({ ...c, path: `day${i}.${c.path}` })));
        merged.push(mergedDay);
      }
      return { merged, conflicts };
    }

    function mergeTrips(base, local, cloud) {
      const conflicts = [];
      const merged = {};
      // Merge simple top-level fields
      for (const k of ['heroTitle','heroSubtitle','heroSnippet','homeBattery']) {
        const r = mergeField(base?.[k], local?.[k], cloud?.[k]);
        if (r.conflict) {
          conflicts.push({ path: k, local: r.local, cloud: r.cloud });
          merged[k] = cloud?.[k];
        } else { merged[k] = r.value; }
      }
      // Merge startTimes by index
      const stMax = Math.max(base?.startTimes?.length||0, local?.startTimes?.length||0, cloud?.startTimes?.length||0);
      merged.startTimes = [];
      for (let i = 0; i < stMax; i++) {
        const r = mergeField(base?.startTimes?.[i], local?.startTimes?.[i], cloud?.startTimes?.[i]);
        if (r.conflict) {
          conflicts.push({ path: `startTimes[${i}]`, local: r.local, cloud: r.cloud });
          merged.startTimes.push(cloud?.startTimes?.[i]);
        } else { merged.startTimes.push(r.value); }
      }
      // Merge comments by stopId
      const commentKeys = new Set([...Object.keys(base?.comments||{}), ...Object.keys(local?.comments||{}), ...Object.keys(cloud?.comments||{})]);
      merged.comments = {};
      for (const k of commentKeys) {
        const r = mergeField(base?.comments?.[k], local?.comments?.[k], cloud?.comments?.[k]);
        if (r.conflict) {
          conflicts.push({ path: `comments.${k}`, local: r.local, cloud: r.cloud });
          merged.comments[k] = cloud?.comments?.[k];
        } else { if (r.value) merged.comments[k] = r.value; }
      }
      // Merge days
      const dr = mergeDays(base?.days, local?.days, cloud?.days);
      merged.days = dr.merged;
      conflicts.push(...dr.conflicts);
      return { merged, conflicts };
    }

    // ── Google Transit API (via server proxy) ──
    async function fetchTransitOptions(fromLat, fromLng, toLat, toLng, departureISO) {

      } catch { return { error: "Transit API unavailable" }; }

      // ── Cloud save state ──
      const [cloudSaving, setCloudSaving] = useState(false);

      const onCloudSave = async (forceOverwrite) => {
        setShowSaveConfirm(false);

        try {
          const localData = getLocalData();
          const expectedSavedAt = baseSnapshot.current?.savedAt || null;

          if (forceOverwrite) {

            const result = await cloudSave(localData, null, true, activeTripId);
            if (result.ok) {
              baseSnapshot.current = { ...localData, savedAt: result.savedAt };
              showCloudMsg("✓ Saved to cloud (forced)");
            }
          } else {
            // Try save with optimistic lock
            const result = await cloudSave(localData, expectedSavedAt, false, activeTripId);
            if (result.ok) {
              baseSnapshot.current = { ...localData, savedAt: result.savedAt };
              showCloudMsg("✓ Saved to cloud");
            } else if (result.conflict) {
              // Someone else saved — attempt three-way merge
              const base = baseSnapshot.current || {};
              const cloud = result.cloudData;
              const { merged, conflicts } = mergeTrips(base, localData, cloud);
              if (conflicts.length === 0) {
                // Auto-merged successfully — save merged result
                const saveResult = await cloudSave(merged, null, true, activeTripId);
                if (saveResult.ok) {
                  applyCloudData({ ...merged, savedAt: saveResult.savedAt });
                  showCloudMsg(`✓ Auto-merged & saved (${Object.keys(merged.days||[]).length} days)`);
                }
              } else {
                // Has conflicts — show conflict UI
                setMergeConflicts({ conflicts, merged, cloudData: cloud, localData });
              }
            }
          }
        } catch (e) { showCloudMsg("✕ Save failed: " + e.message); }
        setCloudSaving(false);
      };

      // Resolve conflicts: user picks per-conflict, then save
      const onResolveConflicts = async (resolutions) => {
        // resolutions: { [path]: "local" | "cloud" }
        const mc = mergeConflicts;
        if (!mc) return;
        const resolved = JSON.parse(JSON.stringify(mc.merged));
        for (const c of mc.conflicts) {
          const val = resolutions[c.path] === "local" ? c.local : c.cloud;
          // Apply resolution to the merged object by path
          applyByPath(resolved, c.path, val);
        }
        setCloudSaving(true);
        try {
          const result = await cloudSave(resolved, null, true, activeTripId);
          if (result.ok) {
            applyCloudData({ ...resolved, savedAt: result.savedAt });
            showCloudMsg("✓ Conflicts resolved & saved");
          }
        } catch (e) { showCloudMsg("✕ Save failed: " + e.message); }
        setMergeConflicts(null);
        setCloudSaving(false);
      };

      // Helper: apply value to nested object by dot-path like "day0.stop.abc.name"
      function applyByPath(obj, path, value) {
        const m = path.match(/^day(\d+)\.stop\.([^.]+)\.(.+)$/);
        if (m) { const [,di,sid,field] = m; const stop = obj.days?.[+di]?.stops?.find(s=>s.id===sid); if (stop) stop[field] = value; return; }
        const dm = path.match(/^day(\d+)\.(.+)$/);
        if (dm) { if (obj.days?.[+dm[1]]) obj.days[+dm[1]][dm[2]] = value; return; }
        const sm = path.match(/^startTimes\[(\d+)\]$/);
        if (sm) { if (obj.startTimes) obj.startTimes[+sm[1]] = value; return; }
        const cm = path.match(/^comments\.(.+)$/);
        if (cm) { if (obj.comments) obj.comments[cm[1]] = value; return; }
        obj[path] = value; // top-level field
      }

      const onCloudReset = async () => {

      const [recalcStopIds, setRecalcStopIds] = useState(new Set());

      const [heroSnippet, setHeroSnippet] = useState(() => initialLoad?.heroSnippet || localStorage.getItem("heroSnippet") || "Melbourne → Geelong → Great Ocean Road → Warrnambool → Mount Gambier → Naracoorte → Pink Lake → Home");

      const getSnapshot = () => JSON.parse(JSON.stringify({ days, heroTitle, heroSubtitle, heroSnippet }));

      // Auto-scroll when dragging near viewport edges
      // (Chrome/Edge block scroll wheel during HTML5 drag, so edge-scroll is the only way)
      React.useEffect(() => {
        let scrollRAF = null;
        let scrollSpeed = 0;
        const EDGE = 150; // large zone for easy scrolling
        const MAX_SPEED = 20;

        const doScroll = () => {
          if (scrollSpeed !== 0) {
            window.scrollBy(0, scrollSpeed);
            scrollRAF = requestAnimationFrame(doScroll);
          }
        };

        const handleDragOver = (e) => {
          e.preventDefault();
          const y = e.clientY;
          const h = window.innerHeight;
          let newSpeed = 0;
          if (y < EDGE) {
            newSpeed = -MAX_SPEED * Math.pow(1 - y / EDGE, 1.5);
          } else if (y > h - EDGE) {
            newSpeed = MAX_SPEED * Math.pow(1 - (h - y) / EDGE, 1.5);
          }
          if (newSpeed !== 0 && scrollSpeed === 0) {
            scrollSpeed = newSpeed;
            scrollRAF = requestAnimationFrame(doScroll);
          } else {
            scrollSpeed = newSpeed;
          }
          if (newSpeed === 0 && scrollRAF) {
            cancelAnimationFrame(scrollRAF);
            scrollRAF = null;
            scrollSpeed = 0;
          }
        };

        const stopScroll = () => {
          scrollSpeed = 0;
          if (scrollRAF) { cancelAnimationFrame(scrollRAF); scrollRAF = null; }
        };

        // Scroll wheel during drag (works in Firefox; Chrome/Edge block it)
        let isDragging = false;
        const onDragStart = () => { isDragging = true; };
        const onDragEndGlobal = () => { isDragging = false; stopScroll(); };
        const onWheel = (e) => { if (isDragging) { window.scrollBy(0, e.deltaY); } };

        window.addEventListener("dragover", handleDragOver);
        window.addEventListener("dragstart", onDragStart, true);
        window.addEventListener("dragend", onDragEndGlobal);
        window.addEventListener("drop", onDragEndGlobal);
        window.addEventListener("wheel", onWheel, { passive: true });
        return () => {
          window.removeEventListener("dragover", handleDragOver);
          window.removeEventListener("dragstart", onDragStart, true);
          window.removeEventListener("dragend", onDragEndGlobal);
          window.removeEventListener("drop", onDragEndGlobal);
          window.removeEventListener("wheel", onWheel);
          stopScroll();
        };
      }, []);

      // Persist days to localStorage
      React.useEffect(() => { localStorage.setItem("tripDays", JSON.stringify(days)); }, [days]);

      // Chain battery across days: each day's startBattery = previous day's ending battery
      const daysWithBattery = useMemo(() => {

      // Clamp activeMapDay when days change

      // Scroll-based day detection for sticky map
      React.useEffect(() => {
        const handleScroll = () => {
          const midY = window.innerHeight * 0.5;

          dayRefs.current.forEach((ref, i) => {

            const rect = ref.getBoundingClientRect();
            const dist = Math.abs(rect.top - midY);

              closestDist = dist;
              closest = i;
            }
          });
          setActiveMapDay(prev => prev !== closest ? closest : prev);
        };
        window.addEventListener("scroll", handleScroll, { passive: true });
        handleScroll(); // initial check

      }, [daysWithBattery.length]);

      const onChange = (id, val) => setDays(p=>p.map(d=>({...d,stops:d.stops.map(s=>s.id===id?{...s,stay:val}:s)})));
      const onStartTime = (i, h, m) => setStartTimes(p=>{const n=[...p];n[i]={h:h??n[i]?.h??8,m:m??n[i]?.m??0};return n;});

      const onDelete = async (id) => {
        // Find affected stops before deleting
        let nextStopToRecalc = null, newPrevStop = null, dayNum = null;
        for (const day of days) {
          const idx = day.stops.findIndex(s => s.id === id);
          if (idx === -1) continue;
          dayNum = day.day;
          newPrevStop = idx > 0 ? day.stops[idx - 1] : null;
          nextStopToRecalc = idx < day.stops.length - 1 ? day.stops[idx + 1] : null;
          break;
        }
        // Remove the stop
        setDays(p => p.map(d => ({...d, stops: d.stops.filter(s => s.id !== id)})));
        // Recalculate the next stop's route from its new previous stop
        if (nextStopToRecalc && nextStopToRecalc.lat && nextStopToRecalc.lng) {
          setRecalcStopIds(new Set([nextStopToRecalc.id]));
          if (newPrevStop && newPrevStop.lat && newPrevStop.lng) {
            const stats = await fetchDriveStats(newPrevStop.lat, newPrevStop.lng, nextStopToRecalc.lat, nextStopToRecalc.lng);
            setDays(p => p.map(d => ({...d, stops: d.stops.map(s => s.id === nextStopToRecalc.id ? {...s, ...stats} : s)})));
          } else {
            setDays(p => p.map(d => ({...d, stops: d.stops.map(s => s.id === nextStopToRecalc.id ? {...s, dist:0, drive:0, batt:0, _routeSource:undefined} : s)})));
          }
          setRecalcStopIds(new Set());
        }
      };

      const onEditField = (id, updates) => setDays(p=>p.map(d=>({...d,stops:d.stops.map(s=>s.id===id?{...s,...updates}:s)})));

      const fileInputRef = React.useRef(null);

      const onExportJSON = () => {
        const data = { days, heroTitle, heroSubtitle, heroSnippet, startTimes, homeBattery };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `trip-plan-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
      };

      const onImportJSON = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(reader.result);
            if (data.days) setDays(data.days);
            if (data.heroTitle) setHeroTitle(data.heroTitle);
            if (data.heroSubtitle) setHeroSubtitle(data.heroSubtitle);
            if (data.heroSnippet) setHeroSnippet(data.heroSnippet);
            if (data.startTimes) setStartTimes(data.startTimes);
            if (data.homeBattery) setHomeBattery(data.homeBattery);
            showCloudMsg("✓ Trip imported!");
          } catch { alert("Invalid trip file"); }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      const onAddStop = (dayNum, index) => {
        const newStop = {
          id: `custom-${Date.now()}`, name: "New Stop", type: "attraction",
          desc: "", stay: 30, min: 10, max: 120,
          dist: 0, drive: 0, batt: 0, emoji: "📍",
          lat: -37.8, lng: 144.0, mq: "Melbourne+VIC",
        };
        setDays(p => p.map(d => {
          if (d.day !== dayNum) return d;
          const stops = [...d.stops];
          stops.splice(index, 0, newStop);
          return { ...d, stops };
        }));
      };

      const toggleEditMode = () => {
        if (!editMode) {
          // Entering edit mode — initialize history with current state
          editHistory.current = [getSnapshot()];
          historyIdx.current = 0;
          setCanUndo(false); setCanRedo(false);
        }
        setEditMode(!editMode);
      };

      const onEditDay = (dayNum, updates) => setDays(p => p.map(d => d.day === dayNum ? { ...d, ...updates } : d));

      const onReorderDay = (fromDay, toDay) => {
        setDays(p => {
          const arr = [...p];
          const fromIdx = arr.findIndex(d => d.day === fromDay);
          const toIdx = arr.findIndex(d => d.day === toDay);
          if (fromIdx === -1 || toIdx === -1) return p;
          const [moved] = arr.splice(fromIdx, 1);
          arr.splice(toIdx, 0, moved);
          return arr.map((d, i) => ({ ...d, day: i + 1 }));
        });
      };

      const onDeleteDay = (dayNum) => {
        setDays(p => p.filter(d => d.day !== dayNum).map((d, i) => ({ ...d, day: i + 1 })));
      };

      const onAddDay = () => {
        const newDayNum = days.length + 1;
        setDays(p => [...p, {
          day: newDayNum, date: `Day ${newDayNum}`, title: "New Day",
          subtitle: "Plan your stops", color: DAY_COLORS[(newDayNum - 1) % DAY_COLORS.length],
          gradient: `day-gradient-${((newDayNum - 1) % 4) + 1}`, startBattery: 100,
          stops: []
        }]);
      };

      const totals = useMemo(()=>{
        let d=0,dr=0,s=0,c=0,cs=0;
        daysWithBattery.forEach(day=>{const st=dayStats(day.stops);d+=st.dist;dr+=st.drv;s+=st.stay;c+=st.chrg;cs+=st.cs;});
        return {d,dr,s,c,cs};
      },[daysWithBattery]);

      // ── Conflict Resolution Modal ──
      const ConflictModal = () => {
        const [resolutions, setResolutions] = useState({});
        const mc = mergeConflicts;
        if (!mc) return null;
        const allResolved = mc.conflicts.every(c => resolutions[c.path]);
        const pick = (path, choice) => setResolutions(p => ({ ...p, [path]: choice }));
        const formatValue = (v) => { if (v == null) return "—"; if (typeof v === "object") return JSON.stringify(v); return String(v); };
        const formatPath = (p) => {
          return p.replace(/^day(\d+)\./, "Day $1 → ").replace(/stop\.([^.]+)\./, "Stop → ").replace(/startTimes\[(\d+)\]/, "Day $1 start time");
        };
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4">

              </div>
              <div className="flex-1 overflow-y-auto px-5 py-3 space-y-3">

                        <div className="text-[9px] font-bold uppercase text-green-400 mb-1">Cloud version</div>
                        <div className="text-[11px] text-white break-all">{formatValue(c.cloud)}</div>
                      </button>
                    </div>
                  </div>

              </div>

                <button onClick={() => onResolveConflicts(resolutions)} disabled={!allResolved}

                  {allResolved ? "✓ Save resolved" : `Pick all (${mc.conflicts.length - Object.keys(resolutions).length} remaining)`}

                  Force mine

                <button onClick={() => setMergeConflicts(null)}

                  Cancel
                </button>
              </div>
            </div>
          </div>
        );

          <div className="absolute inset-0 bg-gradient-to-br from-blue-900/20 via-teal-900/10 to-purple-900/20" />

            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 rounded-full" style={{background:"radial-gradient(circle, rgba(20,184,166,0.15) 0%, transparent 70%)", animation:"splash-glow 3s ease-in-out infinite"}} />

            </div>
            <div style={{animation:"splash-text 0.6s ease-out 0.5s forwards", opacity:0}} className="mt-4">
              <span className="text-[10px] text-gray-600">Syncing from cloud</span>

          </div>
        </div>

            {/* Nav header */}
            <div className="px-5 pt-5 pb-4 border-b border-[#2a2a2a]">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2.5">
                  <span className="text-2xl">🌏</span>
                  <span className="text-xs font-extrabold uppercase tracking-[0.15em] gradient-text">JX Travel Planner</span>
                </div>
                <button onClick={()=>setNavOpen(false)} className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/5 text-gray-500 hover:text-white transition-colors">
                  <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
              </div>
            </div>

            {/* Pages section */}
            <div className="px-3 pt-4 pb-2">
              <div className="text-[9px] font-bold uppercase tracking-widest text-gray-600 px-2 mb-2">Pages</div>
              <button onClick={()=>setNavOpen(false)}
                className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg bg-white/5 text-white text-[13px] font-medium mb-1">
                <svg className="w-4 h-4 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                Home
              </button>
              <button onClick={()=>setNavOpen(false)}
                className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/5 text-gray-400 hover:text-white text-[13px] font-medium transition-colors">
                <svg className="w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                Settings
              </button>
            </div>

            {/* Trips section */}
            <div className="px-3 pt-3 flex-1 overflow-y-auto">
              <div className="text-[9px] font-bold uppercase tracking-widest text-gray-600 px-2 mb-2">My Trips</div>

                <div key={t.id} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg mb-1 cursor-pointer transition-all ${

                }`} onClick={()=>onSwitchTrip(t.id)}>
                  <svg className={`w-4 h-4 shrink-0 ${t.id === activeTripId ? "text-blue-400" : "text-gray-600"}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>
                  <div className="flex-1 text-left min-w-0">
                    <div className="text-[13px] font-medium truncate">{t.id === activeTripId ? `${heroTitle} ${heroSubtitle}` : `${t.name} ${t.subtitle || ""}`}</div>
                    <div className="text-[10px] text-gray-500">{t.id === activeTripId ? `${days.length} days · ${days.reduce((a,d)=>a+d.stops.length,0)} stops` : `${t.dayCount} days · ${t.stopCount} stops`}</div>
                  </div>
                  {tripsList.length > 1 && (
                    <button onClick={(e)=>{ e.stopPropagation(); if(confirm("Delete this trip?")) onDeleteTrip(t.id); }}
                      className="shrink-0 w-6 h-6 flex items-center justify-center rounded hover:bg-red-500/20 text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all"
                      style={{opacity: t.id === activeTripId ? 0.3 : 0}} title="Delete trip">
                      <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>

                <span className="text-lg leading-none">+</span>

            <div className="max-w-4xl mx-auto px-4 h-11 flex items-center justify-between">
              <button onClick={()=>setNavOpen(true)} className="flex items-center gap-2.5 group -ml-1 px-2 py-1.5 rounded-lg hover:bg-white/5 transition-all">
                <div className="flex flex-col gap-[4px]">
                  <div className="w-4 h-[1.5px] bg-gray-500 group-hover:bg-white rounded transition-colors" />
                  <div className="w-4 h-[1.5px] bg-gray-500 group-hover:bg-white rounded transition-colors" />
                  <div className="w-4 h-[1.5px] bg-gray-500 group-hover:bg-white rounded transition-colors" />
                </div>
                <span className="text-[10px] font-bold uppercase tracking-[0.15em] text-gray-500 group-hover:text-gray-300 transition-colors hidden sm:inline">Menu</span>
              </button>
              <span className="text-[10px] font-extrabold uppercase tracking-[0.2em] gradient-text">JX Travel Planner</span>
              <div className="flex items-center gap-1.5">
                {cloudMsg && (
                  <span className={`text-[10px] font-medium animate-pulse mr-0.5 ${cloudMsg.startsWith("✕") ? "text-red-400" : "text-green-400"}`}>{cloudMsg}</span>
                )}
                <div className="relative">
                  <button onClick={()=>{ setShowSaveConfirm(!showSaveConfirm); setShowResetConfirm(false); }} disabled={cloudSaving}
                    className="flex items-center gap-1 px-2.5 py-1.5 rounded-md bg-white/5 hover:bg-green-500/10 text-[10px] text-gray-400 hover:text-green-400 transition-all disabled:opacity-50">
                    {cloudSaving ? <span className="inline-block w-3 h-3 border-[1.5px] border-gray-400 border-t-transparent rounded-full animate-spin" /> : <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>} Save
                  </button>
                  {showSaveConfirm && (
                    <div className="absolute top-full right-0 mt-1 bg-[#1a1a1a] border border-[#2a2a2a] rounded-lg shadow-xl p-3 z-50 w-48">
                      <p className="text-[10px] text-gray-400 mb-2">Save current data to cloud?</p>
                      <div className="flex gap-1.5">
                        <button onClick={onCloudSave}
                          className="flex-1 px-2 py-1.5 rounded bg-[#2a2a2a] hover:bg-green-500/20 text-gray-400 hover:text-green-400 text-[10px] font-medium transition-colors">
                          Confirm
                        </button>
                        <button onClick={()=>setShowSaveConfirm(false)}
                          className="flex-1 px-2 py-1.5 rounded bg-blue-500 hover:bg-blue-400 text-white text-[10px] font-bold transition-colors">

                        </button>
                      </div>
                    </div>
                  )}
                </div>
                <div className="relative">
                  <button onClick={()=>{ setShowResetConfirm(!showResetConfirm); setShowSaveConfirm(false); }}
                    className="flex items-center gap-1 px-2.5 py-1.5 rounded-md bg-white/5 hover:bg-blue-500/10 text-[10px] text-gray-400 hover:text-blue-400 transition-all">
                    <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg> Reset
