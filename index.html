    // Tesla Model 3 LFP charging curve (conservative kW at each SOC band)
    // The car limits intake regardless of charger max — these are car-side limits.
    // Charger kW caps the rate if lower than the car curve.
    const CHARGE_CURVE = [
      // [socMin, socMax, carMaxKW]  — conservative real-world values
      [0,   10,  120],
      [10,  20,  145],
      [20,  30,  150],  // LFP peaks around 20-40%
      [30,  40,  140],
      [40,  50,  120],
      [50,  60,   85],
      [60,  70,   60],
      [70,  80,   40],
      [80,  90,   22],
      [90,  95,   12],
      [95, 100,    6],
    ];

    // Simulate charging: given arrival SOC%, charger max kW, and minutes → departure SOC%
    function calcChargedSOC(arrivalPct, chargerKW, minutes) {
      let soc = arrivalPct; // current SOC in %
      const stepMin = 0.5;  // simulate in 30-second steps for accuracy
      let remaining = minutes;

      while (remaining > 0 && soc < 100) {
        const step = Math.min(stepMin, remaining);
        // find the car's charge rate at current SOC
        let carRate = 6; // fallback for >95%
        for (const [lo, hi, kw] of CHARGE_CURVE) {
          if (soc >= lo && soc < hi) { carRate = kw; break; }
        }
        // effective rate = min(car curve, charger max output)
        const effectiveKW = Math.min(carRate, chargerKW);
        // energy added in this time step (kWh)
        const energyAdded = effectiveKW * (step / 60);
        // convert to SOC %
        const socAdded = (energyAdded / BATTERY_KWH) * 100;
        soc = Math.min(100, soc + socAdded);
        remaining -= step;
      }
      return Math.round(soc * 10) / 10; // round to 1 decimal
    }

    // ── Helpers ──
    function fmt(m) { const h=Math.floor(m/60), r=m%60; return h===0?`${r}min`:r===0?`${h}h`:`${h}h ${r}min`; }
    function timeOfDay(h, addM) { const t=h*60+addM, hr=Math.floor(t/60)%24, mn=t%60, ap=hr>=12?"PM":"AM", h12=hr===0?12:hr>12?hr-12:hr; return `${h12}:${String(mn).padStart(2,'0')} ${ap}`; }
    function mapEmbed(stop) {
      // Use POI name for chargers to find the actual Tesla Supercharger business listing
      const q = stop.poi || (stop.mq ? stop.mq.replace(/\+/g, " ") : `${stop.lat},${stop.lng}`);
      return `https://maps.google.com/maps?q=${encodeURIComponent(q)}&z=16&output=embed`;
    }
    function mapLink(stop) {
      const q = stop.poi || stop.mq;
      return `https://www.google.com/maps/search/${q}`;
    }
    function dayRouteUrl(stops) {
      return "https://www.google.com/maps/dir/" + stops.map(s => s.mq).join("/");
    }
    function dayStats(stops) {
      let dist=0, drv=0, stay=0, chrg=0, cs=0;
      stops.forEach(s => { dist+=s.dist; drv+=s.drive; stay+=s.stay; if(s.type==="charge"){chrg+=s.stay;cs++;} });
      return {dist,drv,stay,chrg,cs};
    }

    // ── Charger Status (Open Charge Map API with fallback to local data) ──
    const OCM_API = "https://api.openchargemap.org/v3/poi/";

    async function fetchChargerStatus(lat, lng) {
      try {
        // Search wider radius, no operator filter, to maximize chance of finding the station
        const url = `${OCM_API}?output=json&latitude=${lat}&longitude=${lng}&distance=5&distanceunit=KM&maxresults=5&compact=true&verbose=false`;
        const res = await fetch(url);
        if (!res.ok) return null;
        const data = await res.json();
        if (!data || data.length === 0) return null;
        // Try to find a Tesla station first, otherwise take the closest
        const tesla = data.find(s => {
          const op = s.OperatorInfo?.Title || s.AddressInfo?.Title || "";
          return op.toLowerCase().includes("tesla");
        });
        const site = tesla || data[0];
        const conns = site.Connections || [];
        const totalPoints = conns.reduce((s, c) => s + (c.Quantity || 1), 0);
        const status = site.StatusType?.Title || "Unknown";
        const verified = site.DateLastVerified || site.DateLastStatusUpdate;
        const addr = site.AddressInfo;
        const opName = site.OperatorInfo?.Title || "";
        return {
          title: addr?.Title || "Charging Station",
          status,
          totalPoints,
          isTesla: opName.toLowerCase().includes("tesla"),
          operator: opName,
          connections: conns.map(c => ({
            type: c.ConnectionType?.Title || "Unknown",
            kw: c.PowerKW || 0,
            qty: c.Quantity || 1,
            status: c.StatusType?.Title || status,
          })),
          lastVerified: verified ? new Date(verified).toLocaleDateString() : null,
        };
      } catch { return null; }
    }

    function ChargerAvailability({ lat, lng, stopId, chargeInfo }) {
      const [ocmData, setOcmData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [fetchedAt, setFetchedAt] = useState(null);
      const [ocmFailed, setOcmFailed] = useState(false);

      const doFetch = async () => {
        setLoading(true);
        const result = await fetchChargerStatus(lat, lng);
        setOcmData(result);
        setOcmFailed(!result);
        setFetchedAt(new Date());
        setLoading(false);
      };

      React.useEffect(() => { doFetch(); }, []);

      // Merge: prefer OCM live data, fall back to our hardcoded chargeInfo
      const hasOcm = ocmData && ocmData.isTesla;
      const status = hasOcm ? ocmData.status : "Operational";
      const totalPoints = hasOcm ? ocmData.totalPoints : chargeInfo.stalls;
      const connections = hasOcm && ocmData.connections.length > 0
        ? ocmData.connections
        : [{ type: "CCS2 / Tesla", kw: chargeInfo.kw, qty: chargeInfo.stalls, status: "Operational" }];
      const source = hasOcm ? "Open Charge Map" : "Local data";
      const statusColor = status === "Operational" ? "#22c55e" : status === "Planned" ? "#f59e0b" : "#ef4444";

      return (
        <div className="px-3.5 py-2 border-t border-[#2a2a2a] bg-[#0a0a0a]">
          <div className="flex items-center gap-2 mb-1">
            <span className="text-[10px] font-semibold text-gray-300">📡 Charger Info</span>
            <span className="text-[9px] font-bold px-1.5 py-0.5 rounded-full" style={{background: statusColor + "22", color: statusColor, border: `1px solid ${statusColor}44`}}>
              {status}
            </span>
          </div>
          <div className="flex items-center gap-3 flex-wrap text-[10px]">
            {connections.map((c, i) => (
              <span key={i} className="text-gray-400">
                ⚡ {c.qty}× {c.type} {c.kw > 0 ? `(${c.kw}kW)` : ""}
              </span>
            ))}
          </div>
        </div>
      );
    }

    // ── Comments persistence ──
    function loadComments() {
      try { return JSON.parse(localStorage.getItem("tripComments") || "{}"); } catch { return {}; }
    }
    function saveComments(c) { localStorage.setItem("tripComments", JSON.stringify(c)); }

    function CommentsSection({stopId}) {
      const [comments, setComments] = useState(() => (loadComments()[stopId] || []));
      const [text, setText] = useState("");
      const [open, setOpen] = useState(false);

      const persist = (next) => { const all = loadComments(); all[stopId] = next; saveComments(all); };

      const add = () => {
        if (!text.trim()) return;
        const next = [...comments, { text: text.trim(), ts: new Date().toLocaleString() }];
        setComments(next); persist(next); setText("");
      };

      const remove = (i) => {
        const next = comments.filter((_, j) => j !== i);
        setComments(next); persist(next);
      };

      return (
        <div className="px-3.5 py-2 border-t border-[#2a2a2a]">
          <button onClick={() => setOpen(!open)} className="flex items-center gap-1.5 text-[11px] text-gray-400 hover:text-gray-200 transition-colors w-full text-left">
            <span>💬</span>
            <span className="font-medium">Comments</span>
            {comments.length > 0 && (
              <span className="text-[9px] font-bold px-1.5 py-0.5 rounded-full bg-blue-500/20 text-blue-400">{comments.length}</span>
            )}
            <span className="ml-auto text-[10px] text-gray-600">{open ? "— hide input" : "+ add"}</span>
          </button>
          {comments.length > 0 && (
            <div className="space-y-1.5 mt-2">
              {comments.map((c, i) => (
                <div key={i} className="flex items-start gap-2 bg-[#0d0d0d] rounded-lg p-2 group">
                  <div className="flex-1">
                    <p className="text-[11px] text-gray-300 whitespace-pre-wrap">{c.text}</p>
                    <p className="text-[9px] text-gray-600 mt-0.5">{c.ts}</p>
                  </div>
                  <button onClick={() => remove(i)}
                    className="text-[10px] text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity shrink-0 mt-0.5"
                    title="Delete">✕</button>
                </div>
              ))}
            </div>
          )}
          {open && (
            <div className="flex gap-1.5 mt-2">
              <input value={text} onChange={e => setText(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); add(); }}}
                placeholder="Add a comment..."
                className="flex-1 bg-[#0a0a0a] border border-[#2a2a2a] rounded px-2 py-1.5 text-[11px] text-white placeholder-gray-600 focus:outline-none focus:border-blue-500/50" />
              <button onClick={add}
                className="px-2.5 py-1.5 rounded bg-blue-500/20 hover:bg-blue-500/30 text-blue-400 text-[11px] font-medium transition-colors shrink-0">
                Add
              </button>
            </div>
          )}
        </div>
      );
    }

    // ── Components ──
    function BatteryGauge({pct}) {
      const c = pct>50?"#22c55e":pct>20?"#f59e0b":"#ef4444";
      return (
        <span className="inline-flex items-center gap-1.5">
          <span className="inline-block w-10 h-4 rounded-sm border-2 border-gray-500 relative p-[1px]">
            <span className="block h-full rounded-xs transition-all" style={{width:`${Math.max(0,Math.min(100,pct))}%`,background:c}} />
            <span className="absolute -right-[4px] top-1/2 -translate-y-1/2 w-[2px] h-1.5 bg-gray-500 rounded-r-sm" />
          </span>
          <span className="text-[10px] font-bold" style={{color:c}}>{Math.round(pct)}%</span>
        </span>
      );
    }

    function StopCard({stop, battArr, battDep, arrTime, onChange, color}) {
      const isCh=stop.type==="charge", isSl=stop.type==="sleep", isSt=stop.type==="start";
      const adj = !isSt && !isSl;
      const dotBg = isCh?"#22c55e":isSl?"#6366f1":isSt?color:"#374151";
      const dotBorder = isCh?"#22c55e":color;
      return (
        <div className="flex gap-0 pb-5">
          {/* Left column: time + timeline + duration control */}
          <div className="flex flex-col items-center w-20 shrink-0 pt-1">
            {/* Arrival time */}
            <div className="text-center mb-1.5">
              <div className="text-[9px] text-gray-500 uppercase tracking-wider">Arrive</div>
              <div className="text-[11px] font-bold text-white">{arrTime}</div>
            </div>
            {/* Dot */}
            <div className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] shrink-0 z-10 ${isCh?"charge-pulse":""}`}
                 style={{background:dotBg, border:`2px solid ${dotBorder}`}}>
              {stop.emoji}
            </div>
            {/* Duration control along timeline */}
            {adj ? (
              <div className="flex flex-col items-center flex-1 py-1">
                <div className="w-[2px] flex-1" style={{background:`${color}44`}} />
                <button onClick={()=>onChange(stop.id,Math.min(stop.max,stop.stay+5))}
                  className="w-5 h-5 rounded-full bg-[#2a2a2a] hover:bg-[#3a3a3a] text-[10px] font-bold text-gray-300 flex items-center justify-center shrink-0 my-0.5 transition-colors">+</button>
                <div className="text-center my-0.5 px-1 py-0.5 rounded bg-[#1a1a1a] border border-[#2a2a2a]">
                  <div className="text-[10px] font-bold text-white leading-tight">{fmt(stop.stay)}</div>
                  <div className="text-[8px] text-gray-500">stay</div>
                </div>
                <button onClick={()=>onChange(stop.id,Math.max(stop.min,stop.stay-5))}
                  className="w-5 h-5 rounded-full bg-[#2a2a2a] hover:bg-[#3a3a3a] text-[10px] font-bold text-gray-300 flex items-center justify-center shrink-0 my-0.5 transition-colors">−</button>
                <div className="w-[2px] flex-1" style={{background:`${color}22`}} />
              </div>
            ) : (
              <div className="flex flex-col items-center flex-1 py-1">
                <div className="w-[2px] flex-1" style={{background:`${color}22`}} />
              </div>
            )}
          </div>
          {/* Right: card */}
          <div className="flex-1 min-w-0">
            <div className="card-glow rounded-xl bg-[#141414] border border-[#2a2a2a] overflow-hidden transition-all hover:border-[#3a3a3a]">
              <div className="flex">
                <div className="flex-1 min-w-0">
                  <div className="p-3.5 pb-2.5">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-base">{stop.emoji}</span>
                      <h3 className="font-semibold text-white text-sm">{stop.name}</h3>
                    </div>
                    <p className="text-[11px] text-gray-400 leading-relaxed">{stop.desc}</p>
                  </div>
                  <div className="px-3.5 py-1.5 bg-[#0d0d0d] flex items-center gap-3 flex-wrap text-[11px]">
                    {stop.dist>0 && <span className="text-gray-400">🚗 {stop.dist}km · {fmt(stop.drive)}</span>}
                    {!isSt && <span className="text-gray-400">🔋 <BatteryGauge pct={battArr} /></span>}
                    {isCh && stop.charge && (
                      <span className="ml-auto text-green-400 text-[10px] font-medium px-2 py-0.5 rounded-full bg-green-400/10 border border-green-400/20">
                        {stop.charge.type} ({stop.charge.kw}kW) → {Math.round(battDep)}%
                      </span>
                    )}
                  </div>
                  {isCh && stop.charge && (
                    <div className="px-3.5 py-2 bg-green-500/5 border-t border-green-500/10">
                      <div className="flex items-center gap-3 flex-wrap text-[11px]">
                        <span className="text-[9px] font-bold px-1.5 py-0.5 rounded-full" style={{background:"#22c55e22",color:"#22c55e",border:"1px solid #22c55e44"}}>Operational</span>
                        <span><span className="text-gray-500">Stalls: </span><span className="text-green-400">{stop.charge.stalls}</span></span>
                        <span><span className="text-gray-500">Charger: </span><span className="text-green-400">{stop.charge.kw} kW</span></span>
                        <span><span className="text-gray-500">+{Math.round(battDep - battArr)}% </span><span className="text-gray-600">in {fmt(stop.stay)}</span></span>
                        <span><span className="text-gray-500">Depart: </span><BatteryGauge pct={battDep} /></span>
                      </div>
                      {stop.address && <div className="mt-1 text-[10px] text-gray-500">📍 {stop.address}</div>}
                    </div>
                  )}
                  <CommentsSection stopId={stop.id} />
                  {stop.tip && <div className="px-3.5 py-1.5 border-t border-[#2a2a2a] bg-[#0a0a0a]"><p className="text-[10px] text-yellow-500/80">💡 {stop.tip}</p></div>}
                </div>
                {/* Right: Google Maps link */}
                <a href={mapLink(stop)} target="_blank" rel="noopener noreferrer"
                  className="hidden md:flex w-10 shrink-0 border-l border-[#2a2a2a] items-center justify-center bg-[#0d0d0d] hover:bg-[#1a1a1a] transition-colors group cursor-pointer"
                  title="Open in Google Maps">
                  <div className="flex flex-col items-center gap-1 opacity-40 group-hover:opacity-100 transition-opacity">
                    <span className="text-lg">📍</span>
                    <span className="text-[8px] text-gray-400 group-hover:text-white font-medium writing-mode-vertical" style={{writingMode:"vertical-rl"}}>Maps</span>
                  </div>
                </a>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function DaySection({day, onChange, startH, onStartH}) {
      const [open, setOpen] = useState(true);
      const st = dayStats(day.stops);
      const levels = useMemo(() => {
        let b = day.startBattery, el=0, out=[];
        day.stops.forEach(s => {
          b -= s.batt; el += s.drive;
          const arr=b, t=timeOfDay(startH, el);
          let dep=arr;
          if(s.type==="charge" && s.charge) {
            dep = calcChargedSOC(arr, s.charge.kw, s.stay);
            b = dep;
          }
          out.push({arr,dep,t}); el+=s.stay;
        });
        return out;
      }, [day, startH]);
      const endT = useMemo(()=>timeOfDay(startH, day.stops.reduce((s,x)=>s+x.drive+x.stay,0)), [day,startH]);

      return (
        <div className="mb-7">
          <button onClick={()=>setOpen(!open)} className={`w-full ${day.gradient} rounded-2xl p-5 mb-3 text-left border border-[#2a2a2a] card-glow transition-all hover:scale-[1.003]`}>
            <div className="flex items-start justify-between">
              <div>
                <div className="flex items-center gap-3 mb-2">
                  <span className="text-[11px] font-bold px-3 py-1 rounded-full" style={{background:day.color,color:"#000"}}>DAY {day.day}</span>
                  <span className="text-[11px] text-gray-400">{day.date}</span>
                  <select value={startH} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();onStartH(+e.target.value);}}
                    className="bg-black/40 border border-white/10 rounded px-2 py-0.5 text-[11px] text-white ml-2">
                    {Array.from({length:13},(_,i)=>i+5).map(h=><option key={h} value={h}>{timeOfDay(h,0)}</option>)}
                  </select>
                </div>
                <h2 className="text-lg font-bold text-white mb-0.5">{day.title}</h2>
                <p className="text-sm text-gray-400">{day.subtitle}</p>
              </div>
              <div className="text-xl mt-1">{open?"▾":"▸"}</div>
            </div>
            <div className="flex gap-3 mt-3 flex-wrap">
              {[["Distance",`${st.dist} km`,"white"],["Drive",fmt(st.drv),"white"],["Activities",fmt(st.stay),"#60a5fa"],["Charging",fmt(st.chrg),"#4ade80"],["Schedule",`${timeOfDay(startH,0)} → ${endT}`,"white"]].map(([l,v,c])=>(
                <div key={l} className="bg-black/30 rounded-lg px-3 py-1.5">
                  <div className="text-[9px] text-gray-500 uppercase tracking-wider">{l}</div>
                  <div className="text-sm font-bold" style={{color:c}}>{v}</div>
                </div>
              ))}
            </div>
          </button>
          {/* Day route map */}
          <div className="mb-3 rounded-xl overflow-hidden border border-[#2a2a2a] card-glow relative" style={{height:"220px"}}>
            <iframe
              src={`https://maps.google.com/maps?saddr=${day.stops[0].mq}&daddr=${day.stops.slice(1).map(s=>s.mq).join("+to:")}&output=embed`}
              className="w-full h-full" style={{border:0}} loading="lazy" title={`Day ${day.day} route`} />
            <a href={dayRouteUrl(day.stops)} target="_blank" rel="noopener noreferrer"
              className="absolute top-2 right-2 bg-black/70 hover:bg-black/90 text-white text-[10px] font-bold px-2.5 py-1.5 rounded-lg border border-white/10 transition-colors z-10">
              Open route in Maps ↗
            </a>
          </div>
          {open && <div className="ml-2">{day.stops.map((s,i)=><StopCard key={s.id} stop={s} battArr={levels[i].arr} battDep={levels[i].dep} arrTime={levels[i].t} onChange={onChange} color={day.color} />)}</div>}
        </div>
      );
    }

    // Simulate a full day and return the final battery %
    function simulateDayEndBattery(day) {
      let b = day.startBattery;
      for (const s of day.stops) {
        b -= s.batt;
        if (s.type === "charge" && s.charge) {
          b = calcChargedSOC(b, s.charge.kw, s.stay);
        }
      }
      return b;
    }

    function App() {
      const [days, setDays] = useState(initialDays);
      const [startHours, setStartHours] = useState([8,7,7,6]);

      // Chain battery across days: each day's startBattery = previous day's ending battery
      const daysWithBattery = useMemo(() => {
        const result = [];
        for (let i = 0; i < days.length; i++) {
          if (i === 0) {
            result.push(days[i]); // Day 1 starts at 100%
          } else {
            const prevEnd = simulateDayEndBattery(result[i - 1]);
            result.push({ ...days[i], startBattery: prevEnd });
          }
        }
        return result;
      }, [days]);

      const onChange = (id, val) => setDays(p=>p.map(d=>({...d,stops:d.stops.map(s=>s.id===id?{...s,stay:val}:s)})));
      const onStartH = (i, h) => setStartHours(p=>{const n=[...p];n[i]=h;return n;});

      const totals = useMemo(()=>{
        let d=0,dr=0,s=0,c=0,cs=0;
        daysWithBattery.forEach(day=>{const st=dayStats(day.stops);d+=st.dist;dr+=st.drv;s+=st.stay;c+=st.chrg;cs+=st.cs;});
        return {d,dr,s,c,cs};
      },[daysWithBattery]);

      return (
        <div className="min-h-screen">
          {/* Hero */}
          <header className="relative overflow-hidden border-b border-[#1a1a1a]">
            <div className="absolute inset-0 bg-gradient-to-br from-blue-900/20 via-teal-900/10 to-purple-900/20" />
            <div className="relative max-w-4xl mx-auto px-4 py-10">
              <div className="flex items-center gap-2 mb-3">
                <span className="text-3xl">⚡</span>
                <span className="text-[11px] font-bold uppercase tracking-widest text-gray-500">Tesla Trip Planner</span>
              </div>
              <h1 className="text-4xl md:text-5xl font-extrabold mb-2">
                <span className="gradient-text">Great Ocean Road</span><br/>
                <span className="text-white">& Beyond Adventure</span>
              </h1>
              <p className="text-gray-400 text-base mb-5 max-w-xl">Melbourne → Geelong → Great Ocean Road → Warrnambool → Mount Gambier → Naracoorte → Pink Lake → Home</p>
              <div className="flex items-center gap-2 text-[11px] text-gray-500 mb-5 flex-wrap">
                {[`🚗 ${VEHICLE_INFO.model}`,`🔋 ${VEHICLE_INFO.battery}`,`📏 ~${VEHICLE_INFO.rangeReal}km real range`].map(t=>(
                  <span key={t} className="px-2 py-1 rounded bg-[#1a1a1a] border border-[#2a2a2a]">{t}</span>
                ))}
              </div>
              <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                {[[totals.d.toLocaleString(),"Total km","white"],[fmt(totals.dr),"Driving","white"],[fmt(totals.s),"Activities","#60a5fa"],[String(totals.cs),"Charge stops","#4ade80"],["4","Days","#c084fc"]].map(([v,l,c])=>(
                  <div key={l} className="bg-[#141414] rounded-xl p-3.5 border border-[#2a2a2a]">
                    <div className="text-xl font-bold" style={{color:c}}>{v}</div>
                    <div className="text-[11px] text-gray-500">{l}</div>
                  </div>
                ))}
              </div>
            </div>
          </header>

          {/* Days */}
          <div className="max-w-4xl mx-auto px-4 py-6">
            {daysWithBattery.map((d,i)=><DaySection key={d.day} day={d} onChange={onChange} startH={startHours[i]} onStartH={h=>onStartH(i,h)} />)}
          </div>

          {/* Charging summary */}
          <div className="max-w-4xl mx-auto px-4 pb-10">
            <div className="bg-[#141414] rounded-2xl p-5 border border-[#2a2a2a] card-glow">
              <h3 className="text-base font-bold text-white mb-3">⚡ Charging Strategy Summary</h3>
              <div className="space-y-2">
                {daysWithBattery.flatMap(day => {
                  // simulate battery through the day to get arrival SOC at each charger
                  let b = day.startBattery;
                  return day.stops.map(s => {
                    b -= s.batt;
                    const arr = b;
                    if (s.type==="charge" && s.charge) {
                      const dep = calcChargedSOC(arr, s.charge.kw, s.stay);
                      b = dep;
                      return (
                        <div key={s.id} className="flex items-center justify-between bg-[#0a0a0a] rounded-lg p-2.5 border border-green-500/10">
                          <div className="flex items-center gap-2.5">
                            <span className="text-[10px] font-bold px-2 py-0.5 rounded-full" style={{background:day.color,color:"#000"}}>D{day.day}</span>
                            <div>
                              <div className="text-sm font-medium text-white">{s.name}</div>
                              <div className="text-[10px] text-gray-500">{s.address} · {s.charge.kw}kW</div>
                            </div>
                          </div>
                          <div className="text-right">
                            <div className="text-sm font-semibold text-green-400">{fmt(s.stay)}</div>
                            <div className="text-[10px] text-gray-500">{Math.round(arr)}% → {Math.round(dep)}% (+{Math.round(dep-arr)}%)</div>
                          </div>
                        </div>
                      );
                    }
                    return null;
                  }).filter(Boolean);
                })}
              </div>
              <div className="mt-3 p-2.5 rounded-lg bg-yellow-500/5 border border-yellow-500/10">
                <p className="text-[11px] text-yellow-500/80">⚠️ <strong>Important:</strong> The Model 3 base has ~400km real range (highway) / ~330km (winding GOR). Always stay above 20%. The Warrnambool → Mt Gambier leg (270km) is the longest stretch without a Supercharger — charge to 100%.</p>
              </div>
              <div className="mt-2 p-2.5 rounded-lg bg-blue-500/5 border border-blue-500/10">
                <p className="text-[11px] text-blue-400/80">💡 <strong>LFP Battery Tip:</strong> The Model 3 base uses LFP chemistry. Tesla recommends charging to 100% regularly — safe and helps calibration.</p>
              </div>
            </div>
          </div>

          <footer className="border-t border-[#1a1a1a] py-5 text-center">
            <p className="text-[11px] text-gray-600">Tesla Great Ocean Road Trip Planner · Distances & times are estimates · Verify Supercharger availability via Tesla app</p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
